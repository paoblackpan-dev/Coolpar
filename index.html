function renderPostDetail() {
  if (currentPostIndex === null) return '';
  const p = travelPosts[currentPostIndex];
  if (!p) return '';

  const content = generatePostContent(p);
  const tags = currentLang === 'EN'
    ? [postProvince(p), 'Thailand', 'Travel', 'Road trip', 'Photography']
    : [postProvince(p), 'ประเทศไทย', 'ท่องเที่ยว', 'โรดทริป', 'ถ่ายรูป'];

  // related posts (3 อันถัดไป ที่ไม่ใช่ตัวเอง)
  const related = travelPosts
    .filter((_, i) => i !== currentPostIndex)
    .slice(0, 3);

  const relatedHtml = related.map((rp, i) => {
    const realIdx = travelPosts.indexOf(rp);
    return `
      <div class="post-card" onclick="openPostDetail(${realIdx})">
        <div class="post-cover">
          <img src="${rp.img}" alt="${postProvince(rp)}" loading="lazy" onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#00A082,#007A63)'"/>
          <div class="post-province-tag">${postProvince(rp)}</div>
        </div>
        <div class="post-body">
          <div class="post-author">
            <div class="avatar ${rp.avClass}">${postAvatar(rp)}</div>
            <div class="post-author-info">
              <div class="post-author-name">${postAuthor(rp)}</div>
            </div>
          </div>
          <div class="post-title">${postTitle(rp)}</div>
          <div class="post-stats">
            <span class="post-stat liked">♥ ${formatLikes(rp.likes)}</span>
            <span class="post-stat">${rp.comments}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="post-detail">
      <div style="position:relative">
        <button class="post-detail-back" onclick="show('home')">← ${t('back').replace('← ','')}</button>
        <div class="post-hero">
          <img src="${p.img}" alt="${postProvince(p)}" onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#00A082,#007A63)'"/>
          <div class="post-hero-overlay"></div>
          <div class="post-hero-province">${postProvince(p)}</div>
        </div>
      </div>

      <div class="post-detail-body">
        <h1 class="post-detail-title">${postTitle(p)}</h1>

        <div class="post-detail-author">
          <div class="avatar ${p.avClass}">${postAvatar(p)}</div>
          <div class="pda-info">
            <div class="pda-name">${postAuthor(p)}</div>
            <div class="pda-followers">${p.followers}</div>
          </div>
          <button class="pda-follow-btn" onclick="event.stopPropagation();this.textContent=this.textContent==='${t('pdFollow')}'?'✓':'${t('pdFollow')}'">${t('pdFollow')}</button>
        </div>

        <div class="post-stats-bar">
          <div class="pst-item liked">
            <div class="pst-icon">♥</div>
            <div class="pst-val">${formatLikes(p.likes)}</div>
            <div class="pst-label">${t('pdLikes')}</div>
          </div>
          <div class="pst-item">
            <div class="pst-icon">💬</div>
            <div class="pst-val">${p.comments}</div>
            <div class="pst-label">${t('pdComments')}</div>
          </div>
          <div class="pst-item">
            <div class="pst-icon">↗</div>
            <div class="pst-val">${Math.round(p.likes / 12)}</div>
            <div class="pst-label">${t('pdShares')}</div>
          </div>
        </div>

        <div class="post-content">${content}</div>

        <div class="post-tags">
          ${tags.map(tag => `<span class="post-tag">#${tag}</span>`).join('')}
        </div>

        <div class="post-actions">
          <button class="post-action-btn" id="like-btn" onclick="toggleLike(this)">${t('pdLike')}</button>
          <button class="post-action-btn">${t('pdComment')}</button>
          <button class="post-action-btn">${t('pdShare')}</button>
        </div>

        <div class="post-related-title">${t('pdRelated')}</div>
        <div class="posts-grid">${relatedHtml}</div>
      </div>
    </div>
  `;
}

function toggleLike(btn) {
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    btn.textContent = t('pdLike');
  } else {
    btn.classList.add('active');
    btn.textContent = t('pdLiked');
  }
}

function formatLikes(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace('.0','') + 'k';
  return n;
}

// จุดหมายแสดงตอนยังไม่กรอก — สุ่ม 7 จังหวัดจากจังหวัดดัง
function getDefaultDestinations(limit = 7) {
  const featured = ['เชียงใหม่', 'ภูเก็ต', 'พัทยา', 'อยุธยา', 'กระบี่', 'เขาใหญ่', 'หัวหิน', 'เชียงราย', 'สุราษฎร์ธานี', 'น่าน'];
  const featuredProvinces = featured
    .map(n => provinceDB.find(p => p.name === n))
    .filter(Boolean);
  return shuffle(featuredProvinces).slice(0, limit).map(p => ({
    name: pName(p), meta: pDesc(p), img: p.img
  }));
}

    { id: 'all', label: t('chipAll') },
    { id: 'เหนือ', label: t('chipNorth'), provinces: ['เชียงใหม่','เชียงราย','ปาย','แม่ฮ่องสอน','ลำปาง','น่าน'] },

  ];

  // กรองโพสตามเงื่อนไข
  let filteredPosts = travelPosts.slice(0, 20);
  if (postSearch.query) {
    const q = postSearch.query.toLowerCase();
    filteredPosts = filteredPosts.filter(p =>
      p.provinceTH.toLowerCase().includes(q) ||
      (p.provinceEN && p.provinceEN.toLowerCase().includes(q)) ||

function rerenderStarOnly(inputEl) {
  const results = document.getElementById('home-results');

  const inputValue = inputEl.value;

  // หา star section (อยู่ส่วนล่างของ results)

// คะแนนรวมสำหรับจัดอันดับ — ราคาถูก+เรตติ้งสูง = คะแนนสูง = อยู่บนสุด
// ราคาถูก (1.0) = 50 คะแนน, ราคาแพง (2.0) = 0 คะแนน
// rating 5.0 = 50 คะแนน, rating 4.0 = 0 คะแนน
function getTripScore(tr) {
  const priceScore = (2.0 - tr.pricePerKm) / (2.0 - 0.8) * 50;
  const ratingScore = (tr.rating - 4.0) / (5.0 - 4.0) * 50;
  return priceScore + ratingScore;
}

function filterAvailableTrips() {
  const from = homeSearch.from.trim();
  const to = homeSearch.to.trim();
  const all = getAllTrips();
  if (!from && !to) return all;
  return all.filter(tr => {
    const matchFrom = !from || tr.from.includes(from) || from.includes(tr.from);
    const matchTo = !to || tr.to.includes(to) || to.includes(tr.to);
    return matchFrom && matchTo;
  });
}

// ====== CO2 Impact Calculator ======
// อิงค่ามาตรฐาน: รถยนต์ปล่อย CO2 ~170 ก./กม.
// ผู้โดยสารแชร์เฉลี่ย 2 คน/ทริป → ลดรถที่จะวิ่งแยก = ลด CO2 50%
function getTodayCO2Stats() {
  // ข้อมูลรวมในวันนี้ (mock - ในแอปจริงจะดึงจาก backend)
  const totalTrips = 234;        // ทริปที่วิ่งวันนี้
  const totalDistance = 48520;   // กม. รวม
  const avgSharedRiders = 2.1;   // ผู้โดยสารเฉลี่ยต่อทริป

  // CO2 ที่ลดได้ = ระยะทาง × ปริมาณปล่อย × (จำนวนคนแชร์ - 1)
  // เพราะถ้าไม่แชร์ ทุกคนต้องขับรถของตัวเอง → ปล่อย CO2 หลายเท่า
  const co2PerKm = 170; // กรัม/กม.
  const co2SavedGrams = totalDistance * co2PerKm * (avgSharedRiders - 1);
  const co2SavedKg = co2SavedGrams / 1000;

  return {
    co2Kg: Math.round(co2SavedKg),
    trips: totalTrips,
    distance: totalDistance,
    treesEquivalent: Math.round(co2SavedKg / 21) // ต้นไม้ดูดซับ CO2 ~21 kg/ปี
  };
}

function onSTInput(which) {
  const input = document.getElementById('st-' + which);
  const list = document.getElementById('st-ac-' + which);
  if (!input || !list) return;
  const q = input.value.trim();
  if (q.length < 2) {
    list.classList.remove('show');
    refreshSTTrips();
    return;
  }
  clearTimeout(acTimers['st_' + which]);
  acTimers['st_' + which] = setTimeout(async () => {
    if (acCache[q]) { renderSTAutocomplete(which, acCache[q]); return; }
    list.innerHTML = `<div class="ac-loading">${currentLang === "EN" ? "Searching..." : "กำลังค้นหา..."}</div>`;
    list.classList.add('show');
    try {
      const lang = currentLang === 'EN' ? 'en' : 'th';
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=th&limit=6&accept-language=${lang}`;
      const res = await fetch(url);
      const data = await res.json();
      acCache[q] = data;
      renderSTAutocomplete(which, data);
    } catch (e) {
      list.innerHTML = `<div class="ac-loading">❌ ${currentLang === 'EN' ? 'Search failed' : 'ค้นหาไม่ได้'}</div>`;
    }
    refreshSTTrips();
  }, 300);
}

function renderSTAutocomplete(which, results) {
  const list = document.getElementById('st-ac-' + which);
  if (!list) return;
  if (!results || results.length === 0) {
    list.innerHTML = `<div class="ac-loading">${currentLang === 'EN' ? 'No places found' : 'ไม่พบสถานที่'}</div>`;
    list.classList.add('show');
    return;
  }
  list.innerHTML = results.map(r => {
    const parts = r.display_name.split(',').map(s => s.trim());
    const main = parts[0];
    const sub = parts.slice(1, 4).join(', ');
    return `
      <div class="ac-item" onmousedown="selectSTPlace('${which}', ${JSON.stringify(main).replace(/"/g, '&quot;')})">
        <span class="ac-icon">📍</span>
        <div class="ac-text">
          <div class="ac-main">${main}</div>
          <div class="ac-sub">${sub}</div>
        </div>
      </div>
    `;
  }).join('');
  list.classList.add('show');
}

function selectSTPlace(which, name) {
  const input = document.getElementById('st-' + which);

// ====== CO2 Counter (เพิ่มขึ้นเรื่อยๆ เพื่อแสดงว่าระบบยังลด CO2 อยู่ตลอด) ======
let co2CounterInterval = null;
let co2CurrentValue = null;

function startCO2Counter() {
  // หยุด interval เก่าก่อน
  if (co2CounterInterval) clearInterval(co2CounterInterval);

  const el = document.getElementById('co2-counter');
  if (!el) return;

  // เริ่มจากค่าปัจจุบันบน UI
  if (co2CurrentValue === null) {
    co2CurrentValue = parseInt(el.textContent.replace(/,/g, '')) || 0;
  } else {
    // ใส่ค่าล่าสุดที่เก็บไว้
    el.textContent = co2CurrentValue.toLocaleString();
  }

  // อัปเดตทุก 1.5-3 วินาที — เพิ่ม 1-5 kg ต่อครั้ง
  co2CounterInterval = setInterval(() => {
    const el2 = document.getElementById('co2-counter');
    if (!el2) {
      // หน้านี้ไม่อยู่บน home แล้ว — หยุด
      clearInterval(co2CounterInterval);
      co2CounterInterval = null;
      return;
    }
    const inc = 1 + Math.floor(Math.random() * 5); // 1-5
    co2CurrentValue += inc;
    el2.textContent = co2CurrentValue.toLocaleString();
    // pulse animation เล็กๆ
    el2.classList.remove('co2-pulse');
    void el2.offsetWidth; // trigger reflow
    el2.classList.add('co2-pulse');
  }, 1500 + Math.random() * 1500);
}

    return;
  }

  // กรณี 3: กรอกครบทั้งต้น-ปลาย → แสดงทริปที่มี (เรียงตามคะแนน)
  const sortedTrips = [...mockTrips].sort((a, b) => getTripScore(b) - getTripScore(a));
  let tripCards = sortedTrips.map((tr, idx) => {
    // badge: อันดับ 1 = best deal, อันดับ 2 = recommended
    let badge = '';
    if (idx === 0) {
      badge = `<div class="trip-rank-badge best">${t('bestDeal')}</div>`;
    } else if (idx === 1) {
      badge = `<div class="trip-rank-badge recommended">${t('recommended')}</div>`;
    }
    return `
    <div class="trip-card" data-screen="detail">
      ${badge}
      <div class="trip-top">
        <div>
          <div class="trip-time">${tr.time}</div>
          <div class="trip-route">${tr.meta}</div>
        </div>
        <div class="trip-price">฿${tr.price}</div>
      </div>
      <div class="trip-driver">
        <div class="avatar ${tr.av}">${tr.initials}</div>
        <div class="driver-info">
          <div>${tr.driver} • ${tr.car}</div>
          <div class="driver-meta">★ ${tr.rating} • ${tr.seats}${t('seatsAvail')}</div>
        </div>
      </div>
    </div>
  `;}).join('');
  results.innerHTML = `
    <div class="section-title-row">
      <p class="section-title">${from} → ${to}${t('found')}${mockTrips.length}${t('foundTrips')}${t('closeP')}</p>
      <button class="section-back-btn" onclick="resetHomeSearch()">← ${t('back').replace('← ','')}</button>
    </div>
    ${tripCards}
    ${renderStarSection()}
  `;

  // bind click event ใหม่
  results.querySelectorAll('[data-screen]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      show(el.dataset.screen);
    });
  });
}

const screenEl = document.getElementById('screen');
const navBtns = document.querySelectorAll('.nav-btn');
const headerEl = document.getElementById('app-header');
const navEl = document.getElementById('app-nav');
let map = null;

function show(name) {
  // หน้าแผนที่ + post detail + searchTrip + editProfile: ซ่อน header
  const isMapScreen = (name === 'map');
  const isPostDetail = (name === 'postDetail');
  const isSearchTrip = (name === 'searchTrip');
  const isEditProfile = (name === 'editProfile');
  const isPaymentMethods = (name === 'paymentMethods');
  const isVehicles = (name === 'vehicles');
  const isEarnings = (name === 'earnings');
  const isFullScreen = isMapScreen || isPostDetail || isSearchTrip || isEditProfile || isPaymentMethods || isVehicles || isEarnings;
  const wrap = document.querySelector('.header-wrap');
  if (wrap) wrap.style.display = isFullScreen ? 'none' : 'block';
  headerEl.style.display = isFullScreen ? 'none' : 'flex';
  navEl.style.display = isMapScreen ? 'none' : 'grid';
  screenEl.classList.toggle('no-pad', isFullScreen);

  const S = getScreens();
  screenEl.innerHTML = S[name] || S.home;
  screenEl.scrollTop = 0;

  const navName = (name === 'detail') ? 'home'
                : (name === 'chat') ? 'messages'
                : (name === 'userProfile') ? 'messages'
                : (name === 'map') ? 'post'
                : (name === 'postDetail') ? 'home'
                : (name === 'searchTrip') ? 'home'
                : (name === 'editProfile') ? 'profile'
                : (name === 'paymentMethods') ? 'profile'
                : (name === 'vehicles') ? 'profile'
                : (name === 'earnings') ? 'trips'
                : name;
  navBtns.forEach(b => b.classList.toggle('active', b.dataset.screen === navName));
  // อัปเดต notification badge
  setTimeout(updateBellBadge, 50);

  // หน้า post: ตั้งวันที่ default = พรุ่งนี้, คงค่าที่เคยกรอกไว้
  if (name === 'post') {
    const dateInput = document.getElementById('in-date');
    if (tripData.date) {
      dateInput.value = tripData.date;
    } else {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      dateInput.value = tomorrow.toISOString().split('T')[0];
    }
    if (tripData.from) document.getElementById('in-from').value = tripData.from;
    if (tripData.to) document.getElementById('in-to').value = tripData.to;
    if (tripData.time) document.getElementById('in-time').value = tripData.time;
    // render ปุ่ม quick locations
    renderQuickLocations();
    // initial price slider
    setTimeout(() => {
      const slider = document.getElementById('price-slider');
      if (slider) {
        slider.value = tripData.pricePerKm || 1.5;
        updatePriceSlider();
      }
    }, 0);
  }

  if (name === 'map') {
    // ล้างจุดที่เลือกไว้
    selectedPickups.clear();
    setTimeout(initMap, 100);
  }

  if (name === 'home') {
    updateHome();
  } else {
    // ออกจากหน้า home → หยุด CO2 counter
    if (co2CounterInterval) {
      clearInterval(co2CounterInterval);
      co2CounterInterval = null;
    }
  }

  if (name === 'detail') {
    setTimeout(initDetailMap, 100);
  }

  if (name === 'chat') {
    setTimeout(() => {
      const feed = document.getElementById('chat-feed');
      if (feed) feed.scrollTop = feed.scrollHeight;
      const input = document.getElementById('chat-input');
      if (input) input.focus();
    }, 50);
  }

  screenEl.querySelectorAll('[data-screen]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      show(el.dataset.screen);
    });
  });
}

// ====== Quick Locations (GPS + Saved places) ======
// saved places — localStorage (อยู่กับ browser ไม่หาย)
function getSavedPlaces() {
  try {
    return JSON.parse(localStorage.getItem('coolpar_places') || '{}');
  } catch (e) { return {}; }
}
function savePlaces(obj) {
  try { localStorage.setItem('coolpar_places', JSON.stringify(obj)); } catch (e) {}
}

let qlTarget = 'from'; // จะใส่ค่าลง 'from' หรือ 'to'

function setQLTarget(which) {
  qlTarget = which;
  document.getElementById('ql-target-from').classList.toggle('active', which === 'from');
  document.getElementById('ql-target-to').classList.toggle('active', which === 'to');
}

function renderQuickLocations() {
  const container = document.getElementById('quick-locations');
  if (!container) return;

  const saved = getSavedPlaces();
  let html = '';

  // ปุ่มตำแหน่งปัจจุบัน (GPS)
  html += `<button class="quick-loc-btn gps" id="ql-gps" onclick="useCurrentLocation()">
    <span class="ql-icon">📍</span>
    <span>${t('myLocation')}</span>
  </button>`;

  // ปุ่มบ้าน
  if (saved.home) {
    html += `<button class="quick-loc-btn" onclick="useSavedPlace('home')">
      <span class="ql-icon">🏠</span>
      <span>${t('home')}</span>
    </button>`;
  } else {
    html += `<button class="quick-loc-btn" onclick="setSavedPlace('home')" style="border-style:dashed;color:var(--text-muted)">
      <span class="ql-icon">🏠</span>
      <span>+ ${t('setHome')}</span>
    </button>`;
  }

  // ปุ่มที่ทำงาน
  if (saved.work) {
    html += `<button class="quick-loc-btn" onclick="useSavedPlace('work')">
      <span class="ql-icon">💼</span>
      <span>${t('work')}</span>
    </button>`;
  } else {
    html += `<button class="quick-loc-btn" onclick="setSavedPlace('work')" style="border-style:dashed;color:var(--text-muted)">
      <span class="ql-icon">💼</span>
      <span>+ ${t('setWork')}</span>
    </button>`;
  }

  container.innerHTML = html;
}

// ใช้ตำแหน่งปัจจุบันจาก GPS
function useCurrentLocation() {
  if (!navigator.geolocation) {
    alert(t('locationError'));
    return;
  }

  const btn = document.getElementById('ql-gps');
  if (btn) {
    btn.classList.add('loading');
    btn.innerHTML = `<span class="mini-spinner"></span><span>${t('gettingLocation')}</span>`;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      // reverse geocode เพื่อหาชื่อสถานที่
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}&zoom=16`;
        const res = await fetch(url);
        const data = await res.json();

        const parts = (data.display_name || '').split(',').map(s => s.trim());
        const name = parts[0] || (currentLang === 'EN' ? 'My location' : 'ตำแหน่งของฉัน');

        fillLocation(qlTarget, name, lat, lng);
      } catch (e) {
        // ถ้า reverse geocode ไม่ได้ ใช้พิกัดเลย
        fillLocation(qlTarget, currentLang === 'EN' ? 'My location' : 'ตำแหน่งของฉัน', lat, lng);
      }

      if (btn) {
        btn.classList.remove('loading');
        btn.innerHTML = `<span class="ql-icon">📍</span><span>${t('myLocation')}</span>`;
      }
    },
    (err) => {
      alert(t('locationError'));
      if (btn) {
        btn.classList.remove('loading');
        btn.innerHTML = `<span class="ql-icon">📍</span><span>${t('myLocation')}</span>`;
      }
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

// บันทึกตำแหน่งปัจจุบันเป็นบ้าน/ที่ทำงาน
function setSavedPlace(key) {
  if (!navigator.geolocation) {
    alert(t('locationError'));
    return;
  }

  const label = key === 'home' ? t('home') : t('work');
  const confirmMsg = currentLang === 'EN'
    ? `Use current location as ${label}?`
    : `ใช้ตำแหน่งปัจจุบันเป็น${label}?`;
  if (!confirm(confirmMsg)) return;

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}&zoom=16`;
        const res = await fetch(url);
        const data = await res.json();
        const parts = (data.display_name || '').split(',').map(s => s.trim());
        const name = parts[0] || label;

        const saved = getSavedPlaces();
        saved[key] = { name, lat, lng };
        savePlaces(saved);
        renderQuickLocations();
      } catch (e) {
        const saved = getSavedPlaces();
        saved[key] = { name: label, lat, lng };
        savePlaces(saved);
        renderQuickLocations();
      }
    },
    () => alert(t('locationError')),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ใช้สถานที่ที่บันทึกไว้
function useSavedPlace(key) {
  const saved = getSavedPlaces();
  const place = saved[key];
  if (!place) return;
  fillLocation(qlTarget, place.name, place.lat, place.lng);
}

// ใส่ค่าและพิกัดลงในช่อง from/to
function fillLocation(which, name, lat, lng) {
  const input = document.getElementById('in-' + which);
  if (input) input.value = name;
  const list = document.getElementById('ac-' + which);
  if (list) list.classList.remove('show');

  if (which === 'from') {
    tripData.fromCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
  } else {
    tripData.toCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
  }

  // หลังใส่ from แล้ว → สลับ target ไป to โดยอัตโนมัติ
  if (which === 'from') {
    setQLTarget('to');
  }
}

// ====== Price Slider (Driver) ======
function updatePriceSlider() {
  const slider = document.getElementById('price-slider');
  if (!slider) return;
  const pricePerKm = parseFloat(slider.value);  // เก็บภายใน
  tripData.pricePerKm = pricePerKm;

  // คำนวณราคารวมต่อที่นั่ง (ใช้โชว์ผู้ใช้)
  let totalPrice = null;
  if (tripData.distanceKm) {
    totalPrice = Math.round(tripData.distanceKm * pricePerKm);
  } else if (tripData.fromCoords && tripData.toCoords) {
    const approxKm = distanceKm(tripData.fromCoords, tripData.toCoords) * 1.3;
    totalPrice = Math.round(approxKm * pricePerKm);
  }

  // เลือกสี + feedback ตามช่วงราคา (฿0.8 - ฿2.0)
  let color, feedbackClass, feedbackKey;
  if (pricePerKm <= 1.0) {
    color = '#00A082';        // เขียวเข้ม
    feedbackClass = 'fb-1';
    feedbackKey = 'priceFb1';
  } else if (pricePerKm <= 1.3) {
    color = '#43A047';        // เขียว
    feedbackClass = 'fb-2';
    feedbackKey = 'priceFb2';
  } else if (pricePerKm <= 1.6) {
    color = '#FFA630';        // เหลือง/ส้ม
    feedbackClass = 'fb-3';
    feedbackKey = 'priceFb3';
  } else if (pricePerKm <= 1.8) {
    color = '#FF6B00';        // ส้มเข้ม
    feedbackClass = 'fb-4';
    feedbackKey = 'priceFb4';
  } else {
    color = '#DC2626';        // แดง
    feedbackClass = 'fb-5';
    feedbackKey = 'priceFb5';
  }

  // โชว์ราคารวมในตัวเลขใหญ่ด้านบน (แทน /km)
  const priceValDisplay = document.getElementById('price-val-display');
  if (priceValDisplay) {
    priceValDisplay.textContent = totalPrice != null ? totalPrice.toLocaleString() : '—';
    priceValDisplay.style.color = color;
  }

  // สี track + thumb
  const percent = ((pricePerKm - 0.8) / (2.0 - 0.8)) * 100;
  slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent}%, var(--border) ${percent}%, var(--border) 100%)`;
  slider.style.setProperty('--thumb-color', color);

  // เปลี่ยนสี ฿ ด้านบน
  const priceSliderValue = document.querySelector('.price-slider-value');
  if (priceSliderValue) priceSliderValue.style.color = color;

  // เปลี่ยนสีของกล่องรายได้
  const incomeBox = document.querySelector('.price-income-box');
  const incomeValue = document.querySelector('.pib-value');
  if (incomeBox) {
    const bgMap = { 'fb-1': '#D1F0E8', 'fb-2': '#E6F7F3', 'fb-3': '#FFF1DC', 'fb-4': '#FFE4CC', 'fb-5': '#FEE2E2' };
    incomeBox.style.background = bgMap[feedbackClass] || 'var(--primary-light)';
  }
  if (incomeValue) incomeValue.style.color = color;

  // อัปเดต feedback
  const fb = document.getElementById('price-feedback');
  const fbText = document.getElementById('price-feedback-text');
  if (fb && fbText) {
    fb.className = 'price-feedback ' + feedbackClass;
    fbText.textContent = t(feedbackKey);
  }

  // ราคารวมในกล่องรายได้
  const totalEl = document.getElementById('price-total');
  if (totalEl) totalEl.textContent = totalPrice != null ? totalPrice.toLocaleString() : '—';
}

// ====== Autocomplete สถานที่ (Nominatim) ======
const acCache = {}; // cache ผลลัพธ์ ไม่ต้อง fetch ซ้ำ
const acTimers = {}; // debounce timer ของแต่ละ input

async function onPlaceInput(which) {
  const input = document.getElementById('in-' + which);
  const list = document.getElementById('ac-' + which);
  if (!input || !list) return;

  // ล้างพิกัดเดิม เพราะผู้ใช้แก้ค่า → ยังไม่ได้เลือกจาก list
  if (which === 'from') tripData.fromCoords = null;
  else tripData.toCoords = null;

  const q = input.value.trim();
  if (q.length < 2) {
    list.classList.remove('show');
    return;
  }

  // debounce 350ms — กันไม่ให้ยิง API ทุกตัวอักษร
  clearTimeout(acTimers[which]);
  acTimers[which] = setTimeout(async () => {
    // cache
    if (acCache[q]) {
      renderAutocomplete(which, acCache[q]);
      return;
    }

    list.innerHTML = `<div class="ac-loading">${currentLang === "EN" ? "Searching..." : "กำลังค้นหา..."}</div>`;
    list.classList.add('show');

    try {
      const lang = currentLang === 'EN' ? 'en' : 'th';
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=th&limit=6&accept-language=${lang}`;
      const res = await fetch(url);
      const data = await res.json();
      acCache[q] = data;
      renderAutocomplete(which, data);
    } catch (e) {
      list.innerHTML = `<div class="ac-loading">❌ ${currentLang === 'EN' ? 'Search failed' : 'ค้นหาไม่ได้'}</div>`;
    }
  }, 350);
}

function renderAutocomplete(which, results) {
  const list = document.getElementById('ac-' + which);
  if (!list) return;

  if (!results || results.length === 0) {
    list.innerHTML = `<div class="ac-loading">${currentLang === 'EN' ? 'No places found' : 'ไม่พบสถานที่'}</div>`;
    list.classList.add('show');
    return;
  }

  list.innerHTML = results.map(r => {
    // แยกชื่อหลัก + รายละเอียด
    const parts = r.display_name.split(',').map(s => s.trim());
    const main = parts[0];
    const sub = parts.slice(1, 4).join(', ');
    // ใช้ JSON.stringify เพื่อ escape quotes ในชื่อ
    const dataStr = JSON.stringify({ name: main, full: r.display_name, lat: r.lat, lng: r.lon }).replace(/"/g, '&quot;');
    return `
      <div class="ac-item" onmousedown="selectPlace('${which}', ${dataStr})">
        <span class="ac-icon">📍</span>
        <div class="ac-text">
          <div class="ac-main">${main}</div>
          <div class="ac-sub">${sub}</div>
        </div>
      </div>
    `;
  }).join('');
  list.classList.add('show');
}

function selectPlace(which, place) {
  const input = document.getElementById('in-' + which);
  const list = document.getElementById('ac-' + which);
  if (input) input.value = place.name;
  if (list) list.classList.remove('show');
  // เก็บพิกัดไว้ใช้ตอนคำนวณแผนที่
  if (which === 'from') {
    tripData.fromCoords = { lat: parseFloat(place.lat), lng: parseFloat(place.lng) };
  } else {
    tripData.toCoords = { lat: parseFloat(place.lat), lng: parseFloat(place.lng) };
  }
}

function hideAutocomplete(which) {
  // delay เพื่อให้ onmousedown ที่ ac-item ทำงานก่อน
  setTimeout(() => {
    const list = document.getElementById('ac-' + which);
    if (list) list.classList.remove('show');
  }, 200);
}

function confirmPost() {
  if (!requireLogin(currentLang === 'EN' ? 'post a trip' : 'โพสต์ทริป')) return;

  // เช็ค monthly limit (กันคนทำเป็นอาชีพ)
  const limitInfo = checkMonthlyLimit();
  if (limitInfo.atLimit) {
    showSheet(`
      <div class="sheet-grab"></div>
      <div class="booking-confirm">
        <div class="bc-icon" style="background:#FEE2E2;color:#DC2626">!</div>
        <div class="bc-title">${currentLang === 'EN' ? 'Monthly limit reached' : 'ครบจำนวนทริปต่อเดือนแล้ว'}</div>
        <div class="bc-sub" style="margin-bottom:18px;line-height:1.5">${currentLang === 'EN'
          ? `Coolpar limits drivers to ${MONTHLY_LIMIT} trips/month to keep the platform for genuine cost-sharing, not commercial driving.`
          : `Coolpar จำกัด ${MONTHLY_LIMIT} ทริป/เดือน เพื่อเป็นการแชร์ค่าน้ำมันจริงๆ ไม่ใช่ขับเป็นอาชีพ`}</div>
        <button class="btn-primary" onclick="closeSheet()">${currentLang === 'EN' ? 'Got it' : 'เข้าใจแล้ว'}</button>
      </div>
    `);
    return;
  }

  // ตรวจ field ขั้นต่ำ
  const fromVal = document.getElementById('in-from')?.value.trim() || tripData.from;
  const toVal = document.getElementById('in-to')?.value.trim() || tripData.to;
  const dateVal = document.getElementById('in-date')?.value || tripData.date;
  const timeVal = document.getElementById('in-time')?.value || tripData.time || '07:00';

  if (!fromVal || !toVal) {
    showToast(currentLang === 'EN' ? 'Please enter from/to' : 'กรุณากรอกต้นทางและปลายทาง');
    return;
  }

  // คำนวณราคาต่อที่นั่ง (mock: ระยะ * price/km / 1 ที่นั่ง = ผู้โดยสารจ่ายเอง)
  const pricePerKm = tripData.pricePerKm || 1.5;
  const distKm = tripData.distanceKm || 696; // fallback
  const pricePerSeat = Math.round(distKm * pricePerKm);

  // สร้าง trip object
  const tripId = genTripId();
  const driverName = userProfile.name || 'คุณวีรนุช';
  const driverNameEN = userProfile.nameEN || 'Weeranuch';
  const newTrip = {
    id: tripId,
    from: fromVal, to: toVal,
    date: dateVal, time: timeVal,
    driver: driverName, driverEN: driverNameEN,
    av: 'av-1',
    rating: 5.0,
    seats: 3,
    price: pricePerSeat,
    pricePerKm: pricePerKm,
    distKm: distKm,
    // เส้นทางที่คนขับเลือก (สำหรับให้ผู้โดยสารเห็น)
    routeCoords: tripData.selectedRouteCoords || null,
    ownerByMe: true,
    posted: Date.now()
  };

  // 1. เพิ่มเข้า userPostedTrips (สำหรับให้คนอื่นค้นเจอ)
  userPostedTrips.unshift(newTrip);
  saveUserPostedTrips();

  // 2. เพิ่มเข้า myTrips.driver.upcoming (เห็นในหน้าทริปของฉัน)
  const displayTime = formatTripDate(dateVal, timeVal);
  myTrips.driver.upcoming.unshift({
    id: tripId,
    time: displayTime,
    timeEN: displayTime,
    from: fromVal, fromEN: fromVal,
    to: toVal, toEN: toVal,
    other: currentLang === 'EN' ? 'Waiting for passengers' : 'รอผู้โดยสาร',
    otherEN: 'Waiting for passengers',
    price: pricePerSeat,
    status: 'confirmed'
  });
  saveMyTrips();

  // เพิ่มการแจ้งเตือน
  addNotification('trip',
    `ลงประกาศสำเร็จ: ${fromVal} → ${toVal}`,
    `Trip posted: ${fromVal} → ${toVal}`);

  showReturnDialog();
}

// Geocoding via Nominatim (OSM) — แปลงชื่อสถานที่เป็นพิกัด GPS
async function geocode(name) {
  const lang = currentLang === 'EN' ? 'en' : 'th';
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name + ', Thailand')}&limit=1&accept-language=${lang}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || data.length === 0) throw new Error((currentLang === 'EN' ? 'Place not found: ' : 'ไม่พบสถานที่: ') + name);
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch (e) {
    if (e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      throw new Error(currentLang === 'EN'
        ? 'Cannot connect to map server. Check your internet or try again.'
        : 'เชื่อมต่อแผนที่ไม่ได้ ตรวจอินเทอร์เน็ตหรือลองใหม่อีกครั้ง');
    }
    throw e;
  }
}

// Routing via OSRM — คำนวณเส้นทางขับรถจากพิกัด GPS
async function getRoute(from, to) {
  // ขอ 3 ทางเลือก: ?alternatives=true&overview=full
  const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?alternatives=3&overview=full&geometries=geojson`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.routes || data.routes.length === 0) throw new Error(currentLang === 'EN' ? 'Route not found' : 'ไม่พบเส้นทาง');
    return data.routes;  // array ของ routes (ไม่ใช่ตัวเดียว)
  } catch (e) {
    if (e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      throw new Error(currentLang === 'EN'
        ? 'Cannot connect to routing server. Try again.'
        : 'เชื่อมต่อบริการเส้นทางไม่ได้ ลองใหม่อีกครั้ง');
    }
    throw e;
  }
}

// สลับเส้นทางจาก alternatives — คนขับเลือก เส้นที่ 1/2/3
function selectRoute(idx) {
  if (!window._allRoutes || !window._routeLayers) return;
  if (idx === window._selectedRouteIdx) return;
  window._selectedRouteIdx = idx;

  // อัปเดตสีของทุกเส้น
  window._routeLayers.forEach((line, i) => {
    const isSelected = i === idx;
    line.setStyle({
      color: isSelected ? '#00A082' : '#94A3B8',
      weight: isSelected ? 6 : 4,
      opacity: isSelected ? 0.9 : 0.55
    });
    if (isSelected) line.bringToFront();
  });

  // อัปเดตข้อมูลระยะ + เวลา + ราคา
  const route = window._allRoutes[idx];
  const distKmNum = route.distance / 1000;
  const distKm = distKmNum.toFixed(0);
  const durHr = Math.floor(route.duration / 3600);
  const durMin = Math.round((route.duration % 3600) / 60);
  const durText = durHr > 0 ? durHr + ' ชม. ' + durMin + ' น.' : durMin + ' น.';

  tripData.distanceKm = distKmNum;
  tripData.selectedRouteIdx = idx;
  tripData.selectedRouteCoords = route.geometry.coordinates;

  const pricePerKm = tripData.pricePerKm || 1.2;
  const income = Math.round(distKmNum * pricePerKm);

  document.getElementById('rs-distance') && (document.getElementById('rs-distance').textContent = distKm + ' กม.');
  document.getElementById('rs-duration') && (document.getElementById('rs-duration').textContent = durText);
  document.getElementById('rs-income') && (document.getElementById('rs-income').textContent = '฿' + income);

  // อัปเดต UI ปุ่มเลือกเส้นทาง
  document.querySelectorAll('.route-option').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
}

// สร้าง UI เลือกเส้นทาง (3 ปุ่ม)
function renderRouteOptions(routes) {
  if (!routes || routes.length < 2) return '';
  const labels = currentLang === 'EN'
    ? ['Recommended', 'Alternative 1', 'Alternative 2']
    : ['แนะนำ', 'ทางเลือก 1', 'ทางเลือก 2'];

  return `
    <div class="route-options-row">
      ${routes.slice(0, 3).map((r, i) => {
        const km = (r.distance / 1000).toFixed(0);
        const hr = Math.floor(r.duration / 3600);
        const min = Math.round((r.duration % 3600) / 60);
        const time = hr > 0 ? hr + 'h ' + min + 'm' : min + 'm';
        return `
          <button class="route-option ${i === 0 ? 'active' : ''}" onclick="selectRoute(${i})">
            <div class="ro-label">${labels[i] || (currentLang === 'EN' ? 'Route ' + (i+1) : 'เส้นทาง ' + (i+1))}</div>
            <div class="ro-meta">${km} ${currentLang === 'EN' ? 'km' : 'กม.'} · ${time}</div>
          </button>
        `;
      }).join('')}
    </div>
  `;
}

  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([15.87, 100.99], 6);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  try {
    const findingLabel = currentLang === 'EN' ? 'Finding ' : 'กำลังหาพิกัด ';
    const ellipsis = '...';

    let fromPt, toPt;
    // ใช้พิกัดที่เลือกจาก autocomplete ก่อน — เร็วกว่า
    if (tripData.fromCoords) {
      fromPt = tripData.fromCoords;
    } else {
      loadingText.textContent = findingLabel + tripData.from + ellipsis;
      fromPt = await geocode(tripData.from);
    }

    if (tripData.toCoords) {
      toPt = tripData.toCoords;
    } else {
      loadingText.textContent = findingLabel + tripData.to + ellipsis;
      toPt = await geocode(tripData.to);
    }

    loadingText.textContent = currentLang === 'EN' ? 'Calculating route...' : 'กำลังคำนวณเส้นทาง...';
    const routes = await getRoute(fromPt, toPt);
    // เก็บไว้ทั้งหมด — คนขับสามารถสลับเส้นทางได้
    window._allRoutes = routes;
    window._selectedRouteIdx = 0;
    let route = routes[0];

    const greenIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#00A082;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,160,130,0.5)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
    const redIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#DC2626;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(220,38,38,0.5)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
    L.marker([fromPt.lat, fromPt.lng], { icon: greenIcon }).addTo(map).bindPopup('🟢 ' + tripData.from);
    L.marker([toPt.lat, toPt.lng], { icon: redIcon }).addTo(map).bindPopup('🔴 ' + tripData.to);

    // วาดทุกเส้นทาง (alternative routes) สีเทาๆ + เส้นที่เลือกเป็นเขียวเข้ม
    window._routeLayers = [];
    routes.forEach((r, idx) => {
      const isSelected = idx === 0;
      const coordsArr = r.geometry.coordinates.map(c => [c[1], c[0]]);
      const line = L.polyline(coordsArr, {
        color: isSelected ? '#00A082' : '#94A3B8',
        weight: isSelected ? 6 : 4,
        opacity: isSelected ? 0.9 : 0.55,
        lineCap: 'round', lineJoin: 'round'
      }).addTo(map);

      // กดเส้นเทาเพื่อเลือก
      line.on('click', () => selectRoute(idx));

      window._routeLayers.push(line);
    });

    // bring เส้นที่เลือกไปบนสุด
    window._routeLayers[0].bringToFront();
    const routeLine = window._routeLayers[0];

    map.fitBounds(routeLine.getBounds(), { padding: [40, 40], maxZoom: 8 });

    const distKm = (route.distance / 1000).toFixed(0);
    const distKmNum = route.distance / 1000;
    const durHr = Math.floor(route.duration / 3600);
    const durMin = Math.round((route.duration % 3600) / 60);
    const durText = durHr > 0 ? durHr + ' ชม. ' + durMin + ' น.' : durMin + ' น.';

    // เก็บระยะทางไว้สำหรับคำนวณราคา
    tripData.distanceKm = distKmNum;
    const pricePerKm = tripData.pricePerKm || 1.5;
    const incomePerPassenger = Math.round(distKmNum * pricePerKm);

    window._routeInfo = {
      distance: distKm + ' กม.',
      duration: durText,
      income: '฿' + incomePerPassenger
    };

    document.getElementById('rs-route') && (document.getElementById('rs-route').textContent = tripData.from + ' → ' + tripData.to);
    const dt = new Date(tripData.date);
    const locale = currentLang === 'EN' ? 'en-US' : 'th-TH';
    const dateStr = dt.toLocaleDateString(locale, { day: 'numeric', month: 'short' });
    document.getElementById('rs-when') && (document.getElementById('rs-when').textContent = dateStr + ' • ' + tripData.time);
    document.getElementById('rs-distance') && (document.getElementById('rs-distance').textContent = distKm + ' กม.');
    document.getElementById('rs-duration') && (document.getElementById('rs-duration').textContent = durText);
    document.getElementById('rs-income') && (document.getElementById('rs-income').textContent = '฿' + incomePerPassenger);

    // inject ปุ่มเลือกเส้นทาง
    const routeOptCont = document.getElementById('route-options-container');
    if (routeOptCont && routes.length > 1) {
      routeOptCont.innerHTML = renderRouteOptions(routes);
    }

    // เก็บเส้นทางที่ผู้ขับเลือก (สำหรับให้ผู้โดยสารเห็น)
    tripData.selectedRouteCoords = route.geometry.coordinates;
    tripData.selectedRouteIdx = 0;

    // ====== Generate Smart Pickup Points (หาจังหวัดที่ผ่านจริง) ======
    const routeCoords = route.geometry.coordinates; // [lng, lat]

    // คำนวณระยะสะสมของแต่ละจุดบนเส้นทาง
    const cumDist = [0];
    for (let i = 1; i < routeCoords.length; i++) {
      const [lng1, lat1] = routeCoords[i-1];
      const [lng2, lat2] = routeCoords[i];
      const segDist = distanceKm({lat: lat1, lng: lng1}, {lat: lat2, lng: lng2});
      cumDist.push(cumDist[i-1] + segDist);
    }

    // สุ่มตัวอย่างจุดทุก ~30 กม. (ไม่เกิน 14 จุดตัวอย่าง)
    const sampleInterval = Math.max(30, distKmNum / 14); // อย่างน้อย 30 กม. ต่อจุด
    const sampleIndices = [];
    let nextDist = sampleInterval;
    for (let i = 0; i < cumDist.length && nextDist < distKmNum - 20; i++) {
      if (cumDist[i] >= nextDist) {
        sampleIndices.push(i);
        nextDist += sampleInterval;
      }
    }

    // ถ้าเส้นทางสั้น (<80 กม.) แสดงจุดกลาง 2-3 จุด
    if (distKmNum < 80) {
      sampleIndices.length = 0;
      for (let k = 1; k <= 3; k++) {
        const idx = Math.floor(routeCoords.length * k / 4);
        if (routeCoords[idx]) sampleIndices.push(idx);
      }
    }

    loadingText.textContent = currentLang === 'EN' ? 'Finding cities along route...' : 'กำลังหาเมืองที่ผ่าน...';

    // Reverse geocode แต่ละจุด — เอาชื่อจังหวัดมา
    const candidatePoints = [];
    for (const idx of sampleIndices) {
      const [lng, lat] = routeCoords[idx];
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}&zoom=10`;
        const res = await fetch(url);
        const data = await res.json();
        const addr = data.address || {};
        // เอาชื่อจังหวัด/เมืองหลัก
        const province = addr.state || addr.province || addr.county || '';
        const city = addr.city || addr.town || addr.municipality || addr.suburb || '';
        const district = addr.county || addr.district || '';
        const displayName = city || district || province || (currentLang === 'EN' ? 'Stop' : 'จุดพัก');

        candidatePoints.push({
          name: displayName,
          province: province,
          lat: lat,
          lng: lng,
          distFromStart: cumDist[idx]
        });
      } catch (e) {
        // ถ้า fail ใส่จุดเปล่าไว้
        candidatePoints.push({
          name: currentLang === 'EN' ? 'Stop' : 'จุดพัก',
          province: '',
          lat: lat,
          lng: lng,
          distFromStart: cumDist[idx]
        });
      }
    }

    // กรองชื่อซ้ำ (ใช้ name ไม่ใช่ province) — เก็บสูงสุด 10 จุด
    const seenNames = new Set();
    const uniquePoints = [];
    for (const pt of candidatePoints) {
      const key = (pt.name || '').toLowerCase();
      if (key && !seenNames.has(key) && uniquePoints.length < 10) {
        seenNames.add(key);
        uniquePoints.push(pt);
      }
    }

    // สร้าง pickup list
    const pickupPoints = [
      { name: tripData.from, distFromStart: 0, isStart: true }
    ];
    uniquePoints.forEach((pt) => {
      pickupPoints.push({
        name: pt.name + (pt.province && pt.name !== pt.province ? ' · ' + pt.province : ''),
        distFromStart: pt.distFromStart,
        lat: pt.lat,
        lng: pt.lng
      });
    });
    pickupPoints.push({ name: tripData.to, distFromStart: distKmNum, isEnd: true });

    renderPickupPoints(pickupPoints, distKmNum, pricePerKm);

    // วาด marker pickup บนแผนที่ — ใช้สีและขนาดแตกต่างให้ดูเป็นจุดสำคัญ
    uniquePoints.forEach((pt, i) => {
      const stopIcon = L.divIcon({
        className: 'cp-marker',
        html: `<div style="background:#FFA630;color:white;width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 3px 10px rgba(255,166,48,0.5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:'Manrope',sans-serif">${i + 1}</div>`,
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
      const marker = L.marker([pt.lat, pt.lng], { icon: stopIcon }).addTo(map);
      // tooltip บอกชื่อ
      marker.bindTooltip(pt.name, {
        permanent: false,
        direction: 'top',
        offset: [0, -10],
        className: 'pickup-tooltip'
      });
    });

    loading.style.display = 'none';
    summary.style.display = 'block';
    setTimeout(() => map.invalidateSize(), 100);

  } catch (e) {
    loadingText.textContent = '❌ ' + e.message;
    loading.style.background = '#FEF2F2';
    loading.style.color = '#991B1B';
    loading.querySelector('.spinner').style.display = 'none';
  }
}

// render pickup points list
// state เก็บ index ของ pickup ที่ถูกเลือก (สำหรับ driver)
const selectedPickups = new Set();
const MAX_PICKUPS = 6;

function renderPickupPoints(points, totalKm, pricePerKm) {
  const list = document.getElementById('pickup-list');
  if (!list) return;

  const pickupAt = currentLang === 'EN' ? 'Pickup at' : 'ขึ้นที่';
  const kmLabel = currentLang === 'EN' ? ' km' : ' กม.';

  // หัวข้อแสดงจำนวนที่เลือก
  const headerHtml = `
    <div class="pickup-counter-row">
      <div class="pickup-counter-label">
        <span>✓ ${currentLang === 'EN' ? 'Selected' : 'เลือกแล้ว'}</span>
      </div>
      <div class="pickup-counter-val">
        <span id="pickup-count">${selectedPickups.size}</span><span style="color:var(--text-muted)">/${MAX_PICKUPS}</span>
      </div>
    </div>
    <div class="pickup-hint-small" id="pickup-hint-small">
      ${currentLang === 'EN' ? 'Tap dots to select stops you can offer' : 'แตะจุดที่คุณรับผู้โดยสารได้ (สูงสุด ' + MAX_PICKUPS + ' จุด)'}
    </div>
  `;

  const itemsHtml = points.map((pt, idx) => {
    const remainKm = totalKm - pt.distFromStart;
    const price = pt.isEnd ? 0 : Math.round(remainKm * pricePerKm);
    const km = remainKm.toFixed(0);

    const startClass = pt.isStart ? 'start' : '';
    const endClass = pt.isEnd ? 'end' : '';
    const isSelected = selectedPickups.has(idx);
    const selectedClass = isSelected ? 'picked' : '';
    const isMiddle = !pt.isStart && !pt.isEnd;

    return `
      <div class="pickup-item ${startClass} ${endClass} ${selectedClass}" data-pickup-idx="${idx}"
           ${isMiddle ? `onclick="togglePickup(${idx})"` : ''}>
        ${idx > 0 ? '<div class="pickup-line" style="bottom:50%;top:-50%"></div>' : ''}
        ${idx < points.length - 1 ? '<div class="pickup-line" style="top:50%"></div>' : ''}
        <div class="pickup-dot-wrap">
          <div class="pickup-dot">${isSelected ? '<span class="pickup-check">✓</span>' : ''}</div>
        </div>
        <div class="pickup-content">
          <div class="pickup-name">${pt.name}</div>
          <div class="pickup-meta">${pt.isStart ? (currentLang === 'EN' ? 'Starting point (auto)' : 'จุดเริ่มต้น (auto)') :
                                    pt.isEnd ? (currentLang === 'EN' ? 'Destination (auto)' : 'ปลายทาง (auto)') :
                                    pickupAt + ' • ' + (totalKm - remainKm).toFixed(0) + kmLabel + ' ' + (currentLang === 'EN' ? 'in' : 'จากต้นทาง')}</div>
        </div>
        ${!pt.isEnd ? `
          <div class="pickup-price-tag">
            <div class="ppt-price">฿${price}</div>
            <div class="ppt-km">${km}${kmLabel}</div>
          </div>
        ` : `<div class="pickup-price-tag"><div class="ppt-km">${currentLang === 'EN' ? 'End' : 'สิ้นสุด'}</div></div>`}
      </div>
    `;
  }).join('');

  list.innerHTML = headerHtml + itemsHtml;

  // เก็บข้อมูล points ไว้ใน window สำหรับใช้งานต่อ
  window._currentPickups = points;
  window._currentTotalKm = totalKm;
  window._currentPricePerKm = pricePerKm;
}

function togglePickup(idx) {
  if (selectedPickups.has(idx)) {
    selectedPickups.delete(idx);
  } else {
    if (selectedPickups.size >= MAX_PICKUPS) {
      // เด้ง warning เด่นๆ
      const hint = document.getElementById('pickup-hint-small');
      if (hint) {
        hint.textContent = currentLang === 'EN'
          ? `⚠️ Max ${MAX_PICKUPS} stops reached — deselect one first`
          : `⚠️ เลือกครบ ${MAX_PICKUPS} จุดแล้ว — ยกเลิกจุดอื่นก่อน`;
        hint.classList.add('warning');
        setTimeout(() => {
          if (hint) {
            hint.classList.remove('warning');
            hint.textContent = currentLang === 'EN' ? 'Tap dots to select stops you can offer' : 'แตะจุดที่คุณรับผู้โดยสารได้ (สูงสุด ' + MAX_PICKUPS + ' จุด)';
          }
        }, 2500);
      }
      return;
    }
    selectedPickups.add(idx);
  }

  // re-render
  if (window._currentPickups) {
    renderPickupPoints(window._currentPickups, window._currentTotalKm, window._currentPricePerKm);
  }
}

// ====== Trip Detail Map (Passenger View) ======
// state: เก็บ pickup ที่ผู้โดยสารเลือก (สำหรับคำนวณราคา)
let passengerSelectedPickup = null;
let detailMap = null;
let detailPickupPoints = null;
let detailTotalKm = null;
let detailPricePerKm = 1.0; // สมมุติคนขับตั้งราคา ฿1.0/กม.

async function initDetailMap() {
  // mock: สมมุติทริปคือ กรุงเทพ → เชียงใหม่ ราคา ฿650 ทั้งเส้น
  const mockTripFrom = currentLang === 'EN' ? 'Bangkok' : 'กรุงเทพ';
  const mockTripTo = currentLang === 'EN' ? 'Chiang Mai' : 'เชียงใหม่';

  const loadingEl = document.getElementById('detail-map-loading');
  const overlay = document.getElementById('detail-map-overlay');
  const mapDiv = document.getElementById('detail-map');
  if (!mapDiv) return;

  // ลบ map เก่า ถ้ามี
  if (detailMap) {
    detailMap.remove();
    detailMap = null;
  }

  // สร้าง map
  detailMap = L.map('detail-map', { zoomControl: false, attributionControl: false, scrollWheelZoom: false, dragging: true }).setView([15.87, 100.99], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(detailMap);

  try {
    const fromPt = await geocode(mockTripFrom);
    const toPt = await geocode(mockTripTo);
    const routes = await getRoute(fromPt, toPt);
    // ใช้ route แรกเสมอ (passenger view) — production: ดึงจาก trip.routeCoords
    const route = routes[0];

    const routeCoords = route.geometry.coordinates;
    const polylineCoords = routeCoords.map(c => [c[1], c[0]]);
    const distKmNum = route.distance / 1000;
    detailTotalKm = distKmNum;

    // วาดเส้นทาง
    const polyline = L.polyline(polylineCoords, {
      color: '#00A082',
      weight: 4,
      opacity: 0.85
    }).addTo(detailMap);
    detailMap.fitBounds(polyline.getBounds(), { padding: [20, 20] });

    // marker ต้นทาง/ปลายทาง
    const greenIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#00A082;width:14px;height:14px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,160,130,0.5)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    const redIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#DC2626;width:14px;height:14px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(220,38,38,0.5)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    L.marker([fromPt.lat, fromPt.lng], { icon: greenIcon }).addTo(detailMap);
    L.marker([toPt.lat, toPt.lng], { icon: redIcon }).addTo(detailMap);

    // คำนวณจุดจอด — สมมุติคนขับเลือกไว้ 4 จุด (mockup)
    // ใน production จริงจะดึงจาก server
    const cumDist = [0];
    for (let i = 1; i < routeCoords.length; i++) {
      const [lng1, lat1] = routeCoords[i-1];
      const [lng2, lat2] = routeCoords[i];
      cumDist.push(cumDist[i-1] + distanceKm({lat: lat1, lng: lng1}, {lat: lat2, lng: lng2}));
    }

    // จุดจอด 4 จุดที่คนขับเลือก (สมมุติทุก ~140 กม.)
    const driverStops = [];
    const stopDistances = [140, 290, 450, 580]; // กม. จากต้นทาง
    for (const d of stopDistances) {
      if (d < distKmNum) {
        // หา index ที่ระยะใกล้ที่สุด
        let nearestIdx = 0;
        let minDiff = Infinity;
        for (let i = 0; i < cumDist.length; i++) {
          const diff = Math.abs(cumDist[i] - d);
          if (diff < minDiff) { minDiff = diff; nearestIdx = i; }
        }
        driverStops.push({
          lat: routeCoords[nearestIdx][1],
          lng: routeCoords[nearestIdx][0],
          distFromStart: cumDist[nearestIdx]
        });
      }
    }

    // เก็บข้อมูลสำหรับ render list
    const pickupPoints = [
      { name: mockTripFrom, distFromStart: 0, isStart: true }
    ];

    // reverse geocode ทุกจุด (ใน parallel ก็ได้)
    for (let i = 0; i < driverStops.length; i++) {
      const stop = driverStops[i];
      let name = currentLang === 'EN' ? `Stop ${i+1}` : `จุดที่ ${i+1}`;
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${stop.lat}&lon=${stop.lng}&accept-language=${lang}&zoom=10`;
        const res = await fetch(url);
        const data = await res.json();
        const addr = data.address || {};
        name = addr.city || addr.town || addr.suburb || addr.county || addr.state || name;
      } catch (e) {}
      pickupPoints.push({ name, lat: stop.lat, lng: stop.lng, distFromStart: stop.distFromStart });

      // วาด marker
      const stopIcon = L.divIcon({
        className: 'cp-marker',
        html: `<div style="background:#FFA630;color:white;width:22px;height:22px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:'Manrope',sans-serif">${i+1}</div>`,
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
      L.marker([stop.lat, stop.lng], { icon: stopIcon }).addTo(detailMap).bindTooltip(name, { direction: 'top', offset: [0, -8], className: 'pickup-tooltip' });
    }
    pickupPoints.push({ name: mockTripTo, distFromStart: distKmNum, isEnd: true });

    detailPickupPoints = pickupPoints;
    // คำนวณ price per km จากราคาทั้งเส้น (mock: ฿650 / ระยะรวม)
    detailPricePerKm = 650 / distKmNum;

    renderPassengerPickupList(pickupPoints, distKmNum, detailPricePerKm);

    // แสดง overlay ระยะทาง
    if (overlay) {
      overlay.style.display = 'block';
      const distEl = document.getElementById('detail-map-dist');
      if (distEl) distEl.textContent = Math.round(distKmNum) + (currentLang === 'EN' ? ' km' : ' กม.');
    }
    if (loadingEl) loadingEl.style.display = 'none';
    setTimeout(() => detailMap && detailMap.invalidateSize(), 100);

  } catch (e) {
    if (loadingEl) loadingEl.textContent = '❌ ' + e.message;
  }
}

  const pickupAt = currentLang === 'EN' ? 'Pickup at' : 'ขึ้นที่';
  const kmLabel = currentLang === 'EN' ? ' km' : ' กม.';
  passengerSelectedPickup = null;

  list.innerHTML = points.map((pt, idx) => {
    const remainKm = totalKm - pt.distFromStart;
    const price = pt.isEnd ? 0 : Math.round(remainKm * pricePerKm);
    const km = remainKm.toFixed(0);
    const startClass = pt.isStart ? 'start' : '';
    const endClass = pt.isEnd ? 'end' : '';
    const isMiddle = !pt.isStart && !pt.isEnd;
    const isStart = pt.isStart;

    return `
      <div class="pickup-item ${startClass} ${endClass}" data-passenger-pickup-idx="${idx}"
           ${!pt.isEnd ? `onclick="selectPassengerPickup(${idx}, ${remainKm.toFixed(2)}, ${pricePerKm}, ${JSON.stringify(pt.name).replace(/"/g, '&quot;')})"` : ''}>
        ${idx > 0 ? '<div class="pickup-line" style="bottom:50%;top:-50%"></div>' : ''}
        ${idx < points.length - 1 ? '<div class="pickup-line" style="top:50%"></div>' : ''}
        <div class="pickup-dot-wrap">
          <div class="pickup-dot"></div>
        </div>
        <div class="pickup-content">
          <div class="pickup-name">${pt.name}</div>
          <div class="pickup-meta">${pt.isStart ? (currentLang === 'EN' ? 'Starting point' : 'จุดเริ่มต้น') :
                                    pt.isEnd ? (currentLang === 'EN' ? 'Destination' : 'ปลายทาง') :
                                    pickupAt + ' • ' + (totalKm - remainKm).toFixed(0) + kmLabel + ' ' + (currentLang === 'EN' ? 'in' : 'จากต้นทาง')}</div>
        </div>
        ${!pt.isEnd ? `
          <div class="pickup-price-tag">
            <div class="ppt-price">฿${price}</div>
            <div class="ppt-km">${km}${kmLabel}</div>
          </div>
        ` : `<div class="pickup-price-tag"><div class="ppt-km">${currentLang === 'EN' ? 'End' : 'สิ้นสุด'}</div></div>`}
      </div>
    `;
  }).join('');

  // เลือกจุดเริ่มต้น default
  selectPassengerPickup(0, totalKm.toFixed(2), pricePerKm, points[0].name);
}

function selectPassengerPickup(idx, remainKm, pricePerKm, name) {
  passengerSelectedPickup = { idx, remainKm: parseFloat(remainKm), price: Math.round(parseFloat(remainKm) * pricePerKm), name };

  // อัปเดต UI: active state
  document.querySelectorAll('[data-passenger-pickup-idx]').forEach(el => el.classList.remove('picked'));
  const item = document.querySelector(`[data-passenger-pickup-idx="${idx}"]`);
  if (item) item.classList.add('picked');

  // แสดง summary บอกราคาจากจุดที่เลือก
  const summary = document.getElementById('selected-pickup-summary');
  if (summary) {
    summary.style.display = 'flex';
    document.getElementById('sps-name').textContent = name;
    document.getElementById('sps-price').textContent = passengerSelectedPickup.price.toLocaleString();
    document.getElementById('sps-km').textContent = parseFloat(remainKm).toFixed(0) + (currentLang === 'EN' ? ' km' : ' กม.');
  }

  // เปลี่ยน text ของปุ่ม
  const btn = document.getElementById('book-btn');
  if (btn) {
    if (idx === 0) {
      btn.textContent = currentLang === 'EN' ? 'Book this seat (full route)' : 'จองที่นั่งนี้ (เต็มเส้นทาง)';
    } else {
      btn.textContent = currentLang === 'EN' ? `Book from ${name}` : `จองจาก ${name}`;
    }
  }
}

function getPaymentTypeName(type) {

function addPaymentType(type) {
  let sublabel = '', label = getPaymentTypeName(type);

  if (type === 'promptpay') {
    const phone = prompt(currentLang === 'EN' ? 'PromptPay number (phone or ID):' : 'เบอร์พร้อมเพย์ (เบอร์โทรหรือเลขบัตร):');
    if (!phone) return;
    sublabel = phone;
  } else if (type === 'card') {
    const num = prompt(currentLang === 'EN' ? 'Card number (last 4 digits):' : 'เลขบัตร (4 หลักท้าย):');
    if (!num) return;
    sublabel = '•••• ' + num.slice(-4);
    label = currentLang === 'EN' ? 'Credit card' : 'บัตรเครดิต';
  } else if (type === 'bank') {
    const bank = prompt(currentLang === 'EN' ? 'Bank name:' : 'ชื่อธนาคาร:');
    if (!bank) return;
    const acc = prompt(currentLang === 'EN' ? 'Account number (last 4):' : 'เลขบัญชี (4 หลักท้าย):');
    if (!acc) return;
    label = bank;
    sublabel = '•••• ' + acc.slice(-4);
  } else if (type === 'cash') {
    sublabel = currentLang === 'EN' ? 'Pay driver in cash' : 'จ่ายคนขับด้วยเงินสด';
  }

  const newPm = {
    id: 'pm_' + Date.now(),
    type, label, sublabel, isDefault: false
  };
  paymentMethods.push(newPm);
  selectedPaymentId = newPm.id;
  savePaymentMethods();
  showToast(currentLang === 'EN' ? '✓ Added' : '✓ เพิ่มแล้ว');

  closeSheet();
  setTimeout(() => showPaymentPicker(window._paymentCallback), 350);
}

// ลบวิธีจ่ายเงิน (จากหน้าโปรไฟล์)
function deletePaymentMethod(id) {
  const pm = paymentMethods.find(p => p.id === id);
  if (!pm) return;
  if (!confirm(currentLang === 'EN' ? `Delete ${pm.label}?` : `ลบ ${pm.label}?`)) return;
  paymentMethods = paymentMethods.filter(p => p.id !== id);
  if (selectedPaymentId === id && paymentMethods.length > 0) {
    selectedPaymentId = paymentMethods[0].id;
  }
  savePaymentMethods();
  show('paymentMethods');
}

// แทน filter ใน search ให้ใช้ filter เพิ่ม
function applySearchFiltersToTrips(trips) {
  let result = [...trips];

  // กรองเรตติ้ง
  if (searchFilters.minRating > 0) {
    result = result.filter(t => (t.rating || 0) >= searchFilters.minRating);
  }

  // กรองช่วงเวลา (อิงจาก field time ที่มี HH:MM)
  if (searchFilters.timeRange !== 'any') {
    result = result.filter(t => {
      const timeStr = (t.time || '').toString();
      const match = timeStr.match(/(\d{1,2}):(\d{2})/);
      if (!match) return true;
      const hour = parseInt(match[1]);
      if (searchFilters.timeRange === 'morning') return hour >= 5 && hour < 12;
      if (searchFilters.timeRange === 'afternoon') return hour >= 12 && hour < 17;
      if (searchFilters.timeRange === 'evening') return hour >= 17 || hour < 5;
      return true;
    });
  }

  // เรียง
  if (searchFilters.sortBy === 'price') {
    result.sort((a, b) => (a.price || 0) - (b.price || 0));
  } else if (searchFilters.sortBy === 'rating') {
    result.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  } else if (searchFilters.sortBy === 'time') {
    result.sort((a, b) => {
      const aTime = (a.time || '').match(/(\d+):(\d+)/);
      const bTime = (b.time || '').match(/(\d+):(\d+)/);
      const aMin = aTime ? parseInt(aTime[1]) * 60 + parseInt(aTime[2]) : 9999;
      const bMin = bTime ? parseInt(bTime[1]) * 60 + parseInt(bTime[2]) : 9999;
      return aMin - bMin;
    });
  }
  // 'best' = default sort (ไม่ทำอะไร)

  return result;
}

// ====== Escrow System ======
// แอปถือเงินไว้ก่อน → คนขับกด "รับผู้โดยสาร" → โอนเงินอัตโนมัติ
const ESCROW_KEY = 'coolpar_escrow';
let escrowTransactions = [];
try {
  const saved = localStorage.getItem(ESCROW_KEY);
  if (saved) escrowTransactions = JSON.parse(saved);
} catch (e) {}

function saveEscrow() {
  try { localStorage.setItem(ESCROW_KEY, JSON.stringify(escrowTransactions)); } catch (e) {}
}

// ผู้โดยสารจ่ายเงิน → เข้า escrow
function holdInEscrow(tripId, amount, payment, fromUserId, toDriver) {
  const tx = {
    id: 'esc_' + Date.now(),
    tripId,
    amount,
    paymentType: payment.type,
    paymentLabel: payment.label,
    paymentSublabel: payment.sublabel || '',
    fromUserId,
    toDriver,
    status: 'held',         // 'held' | 'released' | 'refunded'
    heldAt: Date.now(),
    releasedAt: null
  };
  escrowTransactions.push(tx);
  saveEscrow();
  return tx;
}

// คนขับยืนยันรับผู้โดยสาร → ปล่อยเงินให้คนขับ
function releaseEscrow(tripId) {
  const tx = escrowTransactions.find(t => t.tripId === tripId && t.status === 'held');
  if (!tx) return null;
  tx.status = 'released';
  tx.releasedAt = Date.now();
  saveEscrow();
  return tx;
}

// คืนเงินถ้ายกเลิก
function refundEscrow(tripId) {
  const tx = escrowTransactions.find(t => t.tripId === tripId && t.status === 'held');
  if (!tx) return null;
  tx.status = 'refunded';
  tx.releasedAt = Date.now();
  saveEscrow();
  return tx;
}

// คนขับกดยืนยัน "รับผู้โดยสารแล้ว"
function confirmPickupAsDriver(tripId) {
  const trip = myTrips.driver.upcoming.find(t => t.id === tripId);
  if (!trip) return;

  if (!confirm(currentLang === 'EN'
      ? `Confirm you picked up the passenger?\nThe payment of ฿${(trip.price || 0).toLocaleString()} will be transferred to you immediately.`
      : `ยืนยันว่ารับผู้โดยสารแล้ว?\nเงินค่าน้ำมัน ฿${(trip.price || 0).toLocaleString()} จะถูกโอนให้คุณทันที`)) return;

  const tx = releaseEscrow(tripId);
  if (tx) {
    trip.status = 'in_progress';
    trip.escrowReleased = true;
    saveMyTrips();

    addNotification('booking',
      `เงิน ฿${tx.amount.toLocaleString()} ถูกโอนเข้าบัญชีของคุณแล้ว`,
      `฿${tx.amount.toLocaleString()} transferred to your account`);

    showToast(currentLang === 'EN'
      ? `✓ Payment ฿${tx.amount.toLocaleString()} released`
      : `✓ รับเงิน ฿${tx.amount.toLocaleString()} แล้ว`);

    show('trips');
  }
}

// ====== Monthly Trip Limit (กันคนทำเป็นอาชีพ) ======
const MONTHLY_LIMIT = 12;  // ขับได้ 12 ทริป/เดือน

function getDriverTripsThisMonth() {
  const now = new Date();
  const monthKey = `${now.getFullYear()}-${now.getMonth()}`;
  return [...myTrips.driver.upcoming, ...myTrips.driver.past].filter(t => {
    // ใช้ id timestamp ถ้ามี
    if (!t.id) return false;
    const ts = parseInt(t.id.replace(/[^0-9]/g, '').slice(0, 13));
    if (!ts) return false;
    const tripDate = new Date(ts);
    return tripDate.getFullYear() === now.getFullYear() && tripDate.getMonth() === now.getMonth();
  }).length;
}

function checkMonthlyLimit() {
  const count = getDriverTripsThisMonth();
  return { count, remaining: MONTHLY_LIMIT - count, atLimit: count >= MONTHLY_LIMIT };
}

function cancelMyTrip(tripId, role) {
  const confirmMsg = role === 'passenger'

    : (currentLang === 'EN' ? 'Cancel this trip?' : 'ยกเลิกทริปนี้?');
  if (!confirm(confirmMsg)) return;

  // ถ้าผู้โดยสารยกเลิก → refund
  if (role === 'passenger') {
    const tx = refundEscrow(tripId);
    if (tx) {
      addNotification('booking',
        `คืนเงิน ฿${tx.amount.toLocaleString()} แล้ว`,
        `Refunded ฿${tx.amount.toLocaleString()}`);
    }
  }

  myTrips[role].upcoming = myTrips[role].upcoming.filter(tr => tr.id !== tripId);
  if (role === 'driver') {
    userPostedTrips = userPostedTrips.filter(tr => tr.id !== tripId);
    saveUserPostedTrips();
  }
  saveMyTrips();
  showToast(currentLang === 'EN' ? '✓ Trip canceled' : '✓ ยกเลิกแล้ว');
  show('trips');
}

    ago: 0
  };
  notifications.unshift(newNotif);
  // จำกัด 50 อันล่าสุด
  if (notifications.length > 50) notifications = notifications.slice(0, 50);
  saveNotifications();
  updateBellBadge();
}
// ====== Notification end ======

// ====== Auth System ======
const AUTH_KEY = 'coolpar_auth';
let authState = {
  isLoggedIn: false,
  isGuest: false,
  user: null  // { name, email, phone, photo, provider }
};

// โหลด session เก่าจาก localStorage
function loadAuthSession() {
  try {
    const saved = localStorage.getItem(AUTH_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      authState = parsed;
      // sync กับ userProfile
      if (parsed.user) {
        if (parsed.user.name) userProfile.name = parsed.user.name;
        if (parsed.user.nameEN) userProfile.nameEN = parsed.user.nameEN;
        if (parsed.user.email) userProfile.email = parsed.user.email;
        if (parsed.user.phone) userProfile.phone = parsed.user.phone;
        if (parsed.user.photo) {
          userProfile.photo = parsed.user.photo;
          userProfile.done.photo = true;
        }
      }
      return true;
    }
  } catch (e) {}
  return false;
}

function saveAuthSession() {
  try {
    localStorage.setItem(AUTH_KEY, JSON.stringify(authState));
  } catch (e) {}
}

// แสดง splash + ตัดสินใจไปหน้าไหน
function initApp() {
  loadAuthSession();
  // splash จะ fade out auto จาก CSS animation
  setTimeout(() => {
    const splash = document.getElementById('splash-screen');
    if (splash) splash.style.display = 'none';

    if (authState.isLoggedIn || authState.isGuest) {
      // ข้าม welcome → เข้าหน้าหลัก
      const welcome = document.getElementById('welcome-screen');
      if (welcome) welcome.style.display = 'none';
      show('home');
    } else {
      // โชว์ welcome
      const welcome = document.getElementById('welcome-screen');
      if (welcome) welcome.style.display = 'block';
    }
    // อัปเดต badge การแจ้งเตือน
    updateBellBadge();
  }, 2100);
}

// กดโลโก้ splash → ข้ามไปหน้า welcome (สำหรับ demo/dev — ดู login ได้เสมอ)
function resetToWelcome() {
  const splash = document.getElementById('splash-screen');
  if (splash) splash.style.display = 'none';
  const welcome = document.getElementById('welcome-screen');
  if (welcome) {
    welcome.style.display = 'block';
    welcome.scrollTop = 0;
  }
}

function toggleOtherAuth() {
  const list = document.getElementById('other-auth-list');
  const arrow = document.getElementById('other-auth-arrow');
  const label = document.getElementById('other-auth-label');
  if (!list) return;
  const isOpen = list.style.display !== 'none';
  list.style.display = isOpen ? 'none' : 'flex';
  if (arrow) arrow.textContent = isOpen ? '▾' : '▴';
  if (label) label.textContent = isOpen
    ? (currentLang === 'EN' ? 'Other options' : 'อื่นๆ')
    : (currentLang === 'EN' ? 'Hide options' : 'ซ่อน');
}

function loginWith(provider) {
  // ข้อมูล mock ตาม provider
  const mockUsers = {
    google: { name: 'วีรนุช', nameEN: 'Weeranuch', email: 'weeranuch@gmail.com', phone: '', provider: 'google' },
    apple: { name: 'วีรนุช', nameEN: 'Weeranuch', email: 'weeranuch@privaterelay.appleid.com', phone: '', provider: 'apple' },
    facebook: { name: 'วีรนุช', nameEN: 'Weeranuch', email: 'weeranuch@fb.com', phone: '', provider: 'facebook' },
    email: null, // ต้องไปหน้ากรอก
    phone: null  // ต้องไปหน้ากรอก
  };

  if (provider === 'email') {
    showEmailLogin();
    return;
  }
  if (provider === 'phone') {
    showPhoneLogin();
    return;
  }

  const user = mockUsers[provider];
  if (!user) return;

  authState.isLoggedIn = true;
  authState.isGuest = false;
  authState.user = user;
  // sync กับ userProfile
  userProfile.name = user.name;
  userProfile.nameEN = user.nameEN;
  userProfile.email = user.email;
  userProfile.done.email = true; // จาก provider แล้ว verify ในตัว

  saveAuthSession();

  // hide welcome → home
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.style.display = 'none';
  show('home');
}

function enterGuestMode() {
  authState.isLoggedIn = false;
  authState.isGuest = true;
  authState.user = null;
  saveAuthSession();
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.style.display = 'none';
  show('home');
}

function logout() {
  const msg = currentLang === 'EN' ? 'Log out?' : 'ออกจากระบบใช่ไหม?';
  if (!confirm(msg)) return;
  authState = { isLoggedIn: false, isGuest: false, user: null };
  try { localStorage.removeItem(AUTH_KEY); } catch (e) {}
  // reset profile photo
  userProfile.photo = null;
  userProfile.done = { photo: false, id: false, email: false, phone: false, vehicle: false };
  // โชว์ welcome อีกครั้ง
  const welcome = document.getElementById('welcome-screen');
  if (welcome) {
    welcome.style.display = 'block';
    welcome.scrollTop = 0;
  }
}

// Gate: ตรวจว่า login หรือไม่ ถ้าไม่ → modal ขอ login
function requireLogin(actionLabel) {
  if (authState.isLoggedIn) return true;
  showLoginRequired(actionLabel);
  return false;
}

function showLoginRequired(actionLabel) {
  // ลบ modal เก่า
  document.querySelectorAll('.login-required-modal').forEach(el => el.remove());

  const phone = document.querySelector('.phone');
  if (!phone) return;

  const title = currentLang === 'EN' ? 'Sign in required' : 'ต้องเข้าสู่ระบบ';
  const sub = actionLabel
    ? (currentLang === 'EN' ? `Sign in to ${actionLabel}` : `กรุณาเข้าสู่ระบบเพื่อ${actionLabel}`)
    : (currentLang === 'EN' ? 'Sign in to use this feature' : 'กรุณาเข้าสู่ระบบเพื่อใช้งาน');

  const modal = document.createElement('div');
  modal.className = 'login-required-modal';
  modal.innerHTML = `
    <div class="login-required-card" onclick="event.stopPropagation()">
      <div class="lr-emoji">🔐</div>
      <div class="lr-title">${title}</div>
      <div class="lr-sub">${sub}</div>
      <div class="lr-actions">
        <button class="lr-primary" onclick="goToLogin()">${currentLang === 'EN' ? 'Sign in / Sign up' : 'เข้าสู่ระบบ / สมัคร'}</button>
        <button class="lr-secondary" onclick="closeLoginRequired()">${currentLang === 'EN' ? 'Not now' : 'ไว้ก่อน'}</button>
      </div>
    </div>
  `;
  modal.onclick = closeLoginRequired;
  phone.appendChild(modal);
}

function closeLoginRequired() {
  document.querySelectorAll('.login-required-modal').forEach(el => el.remove());
}

function goToLogin() {
  closeLoginRequired();
  const welcome = document.getElementById('welcome-screen');
  if (welcome) {
    welcome.style.display = 'block';
    welcome.scrollTop = 0;
  }
}

// หน้า login ด้วยอีเมล (popup ง่ายๆ)
function showEmailLogin() {
  const email = prompt(currentLang === 'EN' ? 'Email:' : 'อีเมล:');
  if (!email) return;
  const pw = prompt(currentLang === 'EN' ? 'Password:' : 'รหัสผ่าน:');
  if (!pw) return;

  authState.isLoggedIn = true;
  authState.isGuest = false;
  authState.user = { name: 'วีรนุช', nameEN: 'Weeranuch', email, phone: '', provider: 'email' };
  userProfile.name = 'วีรนุช';
  userProfile.nameEN = 'Weeranuch';
  userProfile.email = email;
  userProfile.done.email = true;
  saveAuthSession();
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.style.display = 'none';
  show('home');
}

// หน้า login ด้วยเบอร์ + OTP
function showPhoneLogin() {
  const phone = prompt(currentLang === 'EN' ? 'Phone number:' : 'เบอร์โทรศัพท์:');
  if (!phone) return;
  const otp = prompt(currentLang === 'EN' ? 'Enter OTP (any 6 digits):' : 'กรอกรหัส OTP (6 หลักอะไรก็ได้):');
  if (!otp || otp.length < 4) return;

  authState.isLoggedIn = true;
  authState.isGuest = false;
  authState.user = { name: 'วีรนุช', nameEN: 'Weeranuch', email: '', phone, provider: 'phone' };
  userProfile.name = 'วีรนุช';
  userProfile.nameEN = 'Weeranuch';
  userProfile.phone = phone;
  userProfile.done.phone = true;
  saveAuthSession();
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.style.display = 'none';
  show('home');
}
// ====== Auth System end ======

navBtns.forEach(b => b.addEventListener('click', () => {
  // ทุกครั้งกด nav: ถ้า guest mode + กดอะไรนอกจาก home → ขอ login (ยกเว้น home)
  // ปล่อยให้กดได้ทุก tab แต่ action ใน tab จะ gate ทีหลัง
  show(b.dataset.screen);
}));

// init: splash → welcome/home
initApp();
</script>
