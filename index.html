function onSTInput(which) {
  const input = document.getElementById('st-' + which);
  const list = document.getElementById('st-ac-' + which);
  if (!input || !list) return;
  const q = input.value.trim();
  if (q.length < 2) {
    list.classList.remove('show');
    refreshSTTrips();
    return;
  }
  clearTimeout(acTimers['st_' + which]);
  acTimers['st_' + which] = setTimeout(async () => {
    if (acCache[q]) { renderSTAutocomplete(which, acCache[q]); return; }
    list.innerHTML = `<div class="ac-loading">🔍 ${currentLang === 'EN' ? 'Searching...' : 'กำลังค้นหา...'}</div>`;
    list.classList.add('show');
    try {
      const lang = currentLang === 'EN' ? 'en' : 'th';
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=th&limit=6&accept-language=${lang}`;
      const res = await fetch(url);
      const data = await res.json();
      acCache[q] = data;
      renderSTAutocomplete(which, data);
    } catch (e) {
      list.innerHTML = `<div class="ac-loading">❌ ${currentLang === 'EN' ? 'Search failed' : 'ค้นหาไม่ได้'}</div>`;
    }
    refreshSTTrips();
  }, 300);
}

function renderSTAutocomplete(which, results) {
  const list = document.getElementById('st-ac-' + which);
  if (!list) return;
  if (!results || results.length === 0) {
    list.innerHTML = `<div class="ac-loading">${currentLang === 'EN' ? 'No places found' : 'ไม่พบสถานที่'}</div>`;
    list.classList.add('show');
    return;
  }
  list.innerHTML = results.map(r => {
    const parts = r.display_name.split(',').map(s => s.trim());
    const main = parts[0];
    const sub = parts.slice(1, 4).join(', ');
    return `
      <div class="ac-item" onmousedown="selectSTPlace('${which}', ${JSON.stringify(main).replace(/"/g, '&quot;')})">
        <span class="ac-icon">📍</span>
        <div class="ac-text">
          <div class="ac-main">${main}</div>
          <div class="ac-sub">${sub}</div>
        </div>
      </div>
    `;
  }).join('');
  list.classList.add('show');
}

function selectSTPlace(which, name) {
  const input = document.getElementById('st-' + which);
  if (input) input.value = name;

function hideSTAutocomplete(which) {

function clearSTField(which) {

// ====== CO2 Counter (เพิ่มขึ้นเรื่อยๆ เพื่อแสดงว่าระบบยังลด CO2 อยู่ตลอด) ======
let co2CounterInterval = null;
let co2CurrentValue = null;

function startCO2Counter() {
  // หยุด interval เก่าก่อน
  if (co2CounterInterval) clearInterval(co2CounterInterval);

  const el = document.getElementById('co2-counter');
  if (!el) return;

  // เริ่มจากค่าปัจจุบันบน UI
  if (co2CurrentValue === null) {
    co2CurrentValue = parseInt(el.textContent.replace(/,/g, '')) || 0;
  } else {
    // ใส่ค่าล่าสุดที่เก็บไว้
    el.textContent = co2CurrentValue.toLocaleString();
  }

  // อัปเดตทุก 1.5-3 วินาที — เพิ่ม 1-5 kg ต่อครั้ง
  co2CounterInterval = setInterval(() => {
    const el2 = document.getElementById('co2-counter');
    if (!el2) {
      // หน้านี้ไม่อยู่บน home แล้ว — หยุด
      clearInterval(co2CounterInterval);
      co2CounterInterval = null;
      return;
    }
    const inc = 1 + Math.floor(Math.random() * 5); // 1-5
    co2CurrentValue += inc;
    el2.textContent = co2CurrentValue.toLocaleString();
    // pulse animation เล็กๆ
    el2.classList.remove('co2-pulse');
    void el2.offsetWidth; // trigger reflow
    el2.classList.add('co2-pulse');
  }, 1500 + Math.random() * 1500);
}

const screenEl = document.getElementById('screen');
const navBtns = document.querySelectorAll('.nav-btn');
const headerEl = document.getElementById('app-header');
const navEl = document.getElementById('app-nav');
let map = null;

function show(name) {
  // หน้าแผนที่ + post detail + searchTrip + editProfile: ซ่อน header
  const isMapScreen = (name === 'map');
  const isPostDetail = (name === 'postDetail');
  const isSearchTrip = (name === 'searchTrip');
  const isEditProfile = (name === 'editProfile');
  const isFullScreen = isMapScreen || isPostDetail || isSearchTrip || isEditProfile;
  const wrap = document.querySelector('.header-wrap');
  if (wrap) wrap.style.display = isFullScreen ? 'none' : 'block';
  headerEl.style.display = isFullScreen ? 'none' : 'flex';
  navEl.style.display = isMapScreen ? 'none' : 'grid';
  screenEl.classList.toggle('no-pad', isFullScreen);

  const S = getScreens();
  screenEl.innerHTML = S[name] || S.home;
  screenEl.scrollTop = 0;

  const navName = (name === 'detail') ? 'home'
                : (name === 'chat') ? 'messages'
                : (name === 'userProfile') ? 'messages'
                : (name === 'map') ? 'post'
                : (name === 'postDetail') ? 'home'
                : (name === 'searchTrip') ? 'home'
                : (name === 'editProfile') ? 'profile'
                : name;
  navBtns.forEach(b => b.classList.toggle('active', b.dataset.screen === navName));

  // หน้า post: ตั้งวันที่ default = พรุ่งนี้, คงค่าที่เคยกรอกไว้
  if (name === 'post') {
    const dateInput = document.getElementById('in-date');
    if (tripData.date) {
      dateInput.value = tripData.date;
    } else {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      dateInput.value = tomorrow.toISOString().split('T')[0];
    }
    if (tripData.from) document.getElementById('in-from').value = tripData.from;
    if (tripData.to) document.getElementById('in-to').value = tripData.to;
    if (tripData.time) document.getElementById('in-time').value = tripData.time;
    // render ปุ่ม quick locations
    renderQuickLocations();
    // initial price slider
    setTimeout(() => {
      const slider = document.getElementById('price-slider');
      if (slider) {
        slider.value = tripData.pricePerKm || 1.5;
        updatePriceSlider();
      }
    }, 0);
  }

  if (name === 'map') {
    // ล้างจุดที่เลือกไว้
    selectedPickups.clear();
    setTimeout(initMap, 100);
  }

  if (name === 'home') {
    updateHome();
  } else {
    // ออกจากหน้า home → หยุด CO2 counter
    if (co2CounterInterval) {
      clearInterval(co2CounterInterval);
      co2CounterInterval = null;
    }
  }

  if (name === 'detail') {
    setTimeout(initDetailMap, 100);
  }

  if (name === 'chat') {
    setTimeout(() => {
      const feed = document.getElementById('chat-feed');
      if (feed) feed.scrollTop = feed.scrollHeight;
      const input = document.getElementById('chat-input');
      if (input) input.focus();
    }, 50);
  }

  screenEl.querySelectorAll('[data-screen]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      show(el.dataset.screen);
    });
  });
}

// ====== Quick Locations (GPS + Saved places) ======
// saved places — localStorage (อยู่กับ browser ไม่หาย)
function getSavedPlaces() {
  try {
    return JSON.parse(localStorage.getItem('coolpar_places') || '{}');
  } catch (e) { return {}; }
}
function savePlaces(obj) {
  try { localStorage.setItem('coolpar_places', JSON.stringify(obj)); } catch (e) {}
}

let qlTarget = 'from'; // จะใส่ค่าลง 'from' หรือ 'to'

function setQLTarget(which) {
  qlTarget = which;
  document.getElementById('ql-target-from').classList.toggle('active', which === 'from');
  document.getElementById('ql-target-to').classList.toggle('active', which === 'to');
}

function renderQuickLocations() {
  const container = document.getElementById('quick-locations');
  if (!container) return;

  const saved = getSavedPlaces();
  let html = '';

  // ปุ่มตำแหน่งปัจจุบัน (GPS)
  html += `<button class="quick-loc-btn gps" id="ql-gps" onclick="useCurrentLocation()">
    <span class="ql-icon">📍</span>
    <span>${t('myLocation')}</span>
  </button>`;

  // ปุ่มบ้าน
  if (saved.home) {
    html += `<button class="quick-loc-btn" onclick="useSavedPlace('home')">
      <span class="ql-icon">🏠</span>
      <span>${t('home')}</span>
    </button>`;
  } else {
    html += `<button class="quick-loc-btn" onclick="setSavedPlace('home')" style="border-style:dashed;color:var(--text-muted)">
      <span class="ql-icon">🏠</span>
      <span>+ ${t('setHome')}</span>
    </button>`;
  }

  // ปุ่มที่ทำงาน
  if (saved.work) {
    html += `<button class="quick-loc-btn" onclick="useSavedPlace('work')">
      <span class="ql-icon">💼</span>
      <span>${t('work')}</span>
    </button>`;
  } else {
    html += `<button class="quick-loc-btn" onclick="setSavedPlace('work')" style="border-style:dashed;color:var(--text-muted)">
      <span class="ql-icon">💼</span>
      <span>+ ${t('setWork')}</span>
    </button>`;
  }

  container.innerHTML = html;
}

// ใช้ตำแหน่งปัจจุบันจาก GPS
function useCurrentLocation() {
  if (!navigator.geolocation) {
    alert(t('locationError'));
    return;
  }

  const btn = document.getElementById('ql-gps');
  if (btn) {
    btn.classList.add('loading');
    btn.innerHTML = `<span class="mini-spinner"></span><span>${t('gettingLocation')}</span>`;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      // reverse geocode เพื่อหาชื่อสถานที่
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}&zoom=16`;
        const res = await fetch(url);
        const data = await res.json();

        const parts = (data.display_name || '').split(',').map(s => s.trim());
        const name = parts[0] || (currentLang === 'EN' ? 'My location' : 'ตำแหน่งของฉัน');

        fillLocation(qlTarget, name, lat, lng);
      } catch (e) {
        // ถ้า reverse geocode ไม่ได้ ใช้พิกัดเลย
        fillLocation(qlTarget, currentLang === 'EN' ? 'My location' : 'ตำแหน่งของฉัน', lat, lng);
      }

      if (btn) {
        btn.classList.remove('loading');
        btn.innerHTML = `<span class="ql-icon">📍</span><span>${t('myLocation')}</span>`;
      }
    },
    (err) => {
      alert(t('locationError'));
      if (btn) {
        btn.classList.remove('loading');
        btn.innerHTML = `<span class="ql-icon">📍</span><span>${t('myLocation')}</span>`;
      }
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

// บันทึกตำแหน่งปัจจุบันเป็นบ้าน/ที่ทำงาน
function setSavedPlace(key) {
  if (!navigator.geolocation) {
    alert(t('locationError'));
    return;
  }

  const label = key === 'home' ? t('home') : t('work');
  const confirmMsg = currentLang === 'EN'
    ? `Use current location as ${label}?`
    : `ใช้ตำแหน่งปัจจุบันเป็น${label}?`;
  if (!confirm(confirmMsg)) return;

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}&zoom=16`;
        const res = await fetch(url);
        const data = await res.json();
        const parts = (data.display_name || '').split(',').map(s => s.trim());
        const name = parts[0] || label;

        const saved = getSavedPlaces();
        saved[key] = { name, lat, lng };
        savePlaces(saved);
        renderQuickLocations();
      } catch (e) {
        const saved = getSavedPlaces();
        saved[key] = { name: label, lat, lng };
        savePlaces(saved);
        renderQuickLocations();
      }
    },
    () => alert(t('locationError')),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ใช้สถานที่ที่บันทึกไว้
function useSavedPlace(key) {
  const saved = getSavedPlaces();
  const place = saved[key];
  if (!place) return;
  fillLocation(qlTarget, place.name, place.lat, place.lng);
}

// ใส่ค่าและพิกัดลงในช่อง from/to
function fillLocation(which, name, lat, lng) {
  const input = document.getElementById('in-' + which);
  if (input) input.value = name;
  const list = document.getElementById('ac-' + which);
  if (list) list.classList.remove('show');

  if (which === 'from') {
    tripData.fromCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
  } else {
    tripData.toCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
  }

  // หลังใส่ from แล้ว → สลับ target ไป to โดยอัตโนมัติ
  if (which === 'from') {
    setQLTarget('to');
  }
}

// ====== Price Slider (Driver) ======
function updatePriceSlider() {
  const slider = document.getElementById('price-slider');
  if (!slider) return;
  const price = parseFloat(slider.value);
  tripData.pricePerKm = price;

  const priceVal = document.getElementById('price-val');
  if (priceVal) priceVal.textContent = price.toFixed(1);

  // เลือกสี + feedback ตามช่วงราคา (฿1.0 - ฿2.0)
  let color, feedbackClass, feedbackKey;
  if (price <= 1.2) {
    color = '#00A082';        // เขียวเข้ม
    feedbackClass = 'fb-1';
    feedbackKey = 'priceFb1';
  } else if (price <= 1.4) {
    color = '#43A047';        // เขียว
    feedbackClass = 'fb-2';
    feedbackKey = 'priceFb2';
  } else if (price <= 1.6) {
    color = '#FFA630';        // เหลือง/ส้ม
    feedbackClass = 'fb-3';
    feedbackKey = 'priceFb3';
  } else if (price <= 1.8) {
    color = '#FF6B00';        // ส้มเข้ม
    feedbackClass = 'fb-4';
    feedbackKey = 'priceFb4';
  } else {
    color = '#DC2626';        // แดง
    feedbackClass = 'fb-5';
    feedbackKey = 'priceFb5';
  }

  // สี track + thumb
  const percent = ((price - 1.0) / (2.0 - 1.0)) * 100;
  slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent}%, var(--border) ${percent}%, var(--border) 100%)`;
  slider.style.setProperty('--thumb-color', color);

  // เปลี่ยนสีตัวเลขราคา + ฿ ใหญ่ด้านบน
  const priceValEl = document.getElementById('price-val');
  if (priceValEl) priceValEl.style.color = color;
  const priceSliderValue = document.querySelector('.price-slider-value');
  if (priceSliderValue) priceSliderValue.style.color = color;

  // เปลี่ยนสีของกล่องรายได้ (฿ และตัวเลข)
  const incomeBox = document.querySelector('.price-income-box');
  const incomeValue = document.querySelector('.pib-value');
  if (incomeBox) {
    // พื้นกล่องเปลี่ยนเป็นสีอ่อนของ feedback
    const bgMap = { 'fb-1': '#D1F0E8', 'fb-2': '#E6F7F3', 'fb-3': '#FFF1DC', 'fb-4': '#FFE4CC', 'fb-5': '#FEE2E2' };
    incomeBox.style.background = bgMap[feedbackClass] || 'var(--primary-light)';
  }
  if (incomeValue) {
    incomeValue.style.color = color;
  }

  // อัปเดต feedback
  const fb = document.getElementById('price-feedback');
  const fbText = document.getElementById('price-feedback-text');
  if (fb && fbText) {
    fb.className = 'price-feedback ' + feedbackClass;
    fbText.textContent = t(feedbackKey);
  }

  // คำนวณรายได้ประมาณ
  const totalEl = document.getElementById('price-total');
  if (totalEl) {
    if (tripData.distanceKm) {
      const total = Math.round(tripData.distanceKm * price);
      totalEl.textContent = total.toLocaleString();
    } else {
      if (tripData.fromCoords && tripData.toCoords) {
        const approxKm = distanceKm(tripData.fromCoords, tripData.toCoords) * 1.3;
        const total = Math.round(approxKm * price);
        totalEl.textContent = '~' + total.toLocaleString();
      } else {
        totalEl.textContent = '—';
      }
    }
  }
}

// ====== Autocomplete สถานที่ (Nominatim) ======
const acCache = {}; // cache ผลลัพธ์ ไม่ต้อง fetch ซ้ำ
const acTimers = {}; // debounce timer ของแต่ละ input

async function onPlaceInput(which) {
  const input = document.getElementById('in-' + which);
  const list = document.getElementById('ac-' + which);
  if (!input || !list) return;

  // ล้างพิกัดเดิม เพราะผู้ใช้แก้ค่า → ยังไม่ได้เลือกจาก list
  if (which === 'from') tripData.fromCoords = null;
  else tripData.toCoords = null;

  const q = input.value.trim();
  if (q.length < 2) {
    list.classList.remove('show');
    return;
  }

  // debounce 350ms — กันไม่ให้ยิง API ทุกตัวอักษร
  clearTimeout(acTimers[which]);
  acTimers[which] = setTimeout(async () => {
    // cache
    if (acCache[q]) {
      renderAutocomplete(which, acCache[q]);
      return;
    }

    list.innerHTML = `<div class="ac-loading">🔍 ${currentLang === 'EN' ? 'Searching...' : 'กำลังค้นหา...'}</div>`;
    list.classList.add('show');

    try {
      const lang = currentLang === 'EN' ? 'en' : 'th';
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=th&limit=6&accept-language=${lang}`;
      const res = await fetch(url);
      const data = await res.json();
      acCache[q] = data;
      renderAutocomplete(which, data);
    } catch (e) {
      list.innerHTML = `<div class="ac-loading">❌ ${currentLang === 'EN' ? 'Search failed' : 'ค้นหาไม่ได้'}</div>`;
    }
  }, 350);
}

function renderAutocomplete(which, results) {
  const list = document.getElementById('ac-' + which);
  if (!list) return;

  if (!results || results.length === 0) {
    list.innerHTML = `<div class="ac-loading">${currentLang === 'EN' ? 'No places found' : 'ไม่พบสถานที่'}</div>`;
    list.classList.add('show');
    return;
  }

  list.innerHTML = results.map(r => {
    // แยกชื่อหลัก + รายละเอียด
    const parts = r.display_name.split(',').map(s => s.trim());
    const main = parts[0];
    const sub = parts.slice(1, 4).join(', ');
    // ใช้ JSON.stringify เพื่อ escape quotes ในชื่อ
    const dataStr = JSON.stringify({ name: main, full: r.display_name, lat: r.lat, lng: r.lon }).replace(/"/g, '&quot;');
    return `
      <div class="ac-item" onmousedown="selectPlace('${which}', ${dataStr})">
        <span class="ac-icon">📍</span>
        <div class="ac-text">
          <div class="ac-main">${main}</div>
          <div class="ac-sub">${sub}</div>
        </div>
      </div>
    `;
  }).join('');
  list.classList.add('show');
}

function selectPlace(which, place) {
  const input = document.getElementById('in-' + which);
  const list = document.getElementById('ac-' + which);
  if (input) input.value = place.name;
  if (list) list.classList.remove('show');
  // เก็บพิกัดไว้ใช้ตอนคำนวณแผนที่
  if (which === 'from') {
    tripData.fromCoords = { lat: parseFloat(place.lat), lng: parseFloat(place.lng) };
  } else {
    tripData.toCoords = { lat: parseFloat(place.lat), lng: parseFloat(place.lng) };
  }
}

function hideAutocomplete(which) {
  // delay เพื่อให้ onmousedown ที่ ac-item ทำงานก่อน
  setTimeout(() => {
    const list = document.getElementById('ac-' + which);
    if (list) list.classList.remove('show');
  }, 200);
}

// Geocoding via Nominatim (OSM) — แปลงชื่อสถานที่เป็นพิกัด GPS
async function geocode(name) {
  const lang = currentLang === 'EN' ? 'en' : 'th';
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name + ', Thailand')}&limit=1&accept-language=${lang}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || data.length === 0) throw new Error((currentLang === 'EN' ? 'Place not found: ' : 'ไม่พบสถานที่: ') + name);
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch (e) {
    if (e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      throw new Error(currentLang === 'EN'
        ? 'Cannot connect to map server. Check your internet or try again.'
        : 'เชื่อมต่อแผนที่ไม่ได้ ตรวจอินเทอร์เน็ตหรือลองใหม่อีกครั้ง');
    }
    throw e;
  }
}

// Routing via OSRM — คำนวณเส้นทางขับรถจากพิกัด GPS
async function getRoute(from, to) {
  const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.routes || data.routes.length === 0) throw new Error(currentLang === 'EN' ? 'Route not found' : 'ไม่พบเส้นทาง');
    return data.routes[0];
  } catch (e) {
    if (e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      throw new Error(currentLang === 'EN'
        ? 'Cannot connect to routing server. Try again.'
        : 'เชื่อมต่อบริการเส้นทางไม่ได้ ลองใหม่อีกครั้ง');
    }
    throw e;
  }
}

async function initMap() {
  const loading = document.getElementById('map-loading');
  const loadingText = document.getElementById('loading-text');
  const summary = document.getElementById('route-summary');

  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([15.87, 100.99], 6);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  try {
    const findingLabel = currentLang === 'EN' ? 'Finding ' : 'กำลังหาพิกัด ';
    const ellipsis = '...';

    let fromPt, toPt;
    // ใช้พิกัดที่เลือกจาก autocomplete ก่อน — เร็วกว่า
    if (tripData.fromCoords) {
      fromPt = tripData.fromCoords;
    } else {
      loadingText.textContent = findingLabel + tripData.from + ellipsis;
      fromPt = await geocode(tripData.from);
    }

    if (tripData.toCoords) {
      toPt = tripData.toCoords;
    } else {
      loadingText.textContent = findingLabel + tripData.to + ellipsis;
      toPt = await geocode(tripData.to);
    }

    loadingText.textContent = currentLang === 'EN' ? 'Calculating route...' : 'กำลังคำนวณเส้นทาง...';
    const route = await getRoute(fromPt, toPt);

    const greenIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#00A082;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,160,130,0.5)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
    const redIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#DC2626;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(220,38,38,0.5)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
    L.marker([fromPt.lat, fromPt.lng], { icon: greenIcon }).addTo(map).bindPopup('🟢 ' + tripData.from);
    L.marker([toPt.lat, toPt.lng], { icon: redIcon }).addTo(map).bindPopup('🔴 ' + tripData.to);

    const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
    const routeLine = L.polyline(coords, {
      color: '#00A082', weight: 5, opacity: 0.85,
      lineCap: 'round', lineJoin: 'round'
    }).addTo(map);

    map.fitBounds(routeLine.getBounds(), { padding: [40, 40], maxZoom: 8 });

    const distKm = (route.distance / 1000).toFixed(0);
    const distKmNum = route.distance / 1000;
    const durHr = Math.floor(route.duration / 3600);
    const durMin = Math.round((route.duration % 3600) / 60);
    const durText = durHr > 0 ? durHr + ' ชม. ' + durMin + ' น.' : durMin + ' น.';

    // เก็บระยะทางไว้สำหรับคำนวณราคา
    tripData.distanceKm = distKmNum;
    const pricePerKm = tripData.pricePerKm || 1.5;
    const incomePerPassenger = Math.round(distKmNum * pricePerKm);

    window._routeInfo = {
      distance: distKm + ' กม.',
      duration: durText,
      income: '฿' + incomePerPassenger
    };

    document.getElementById('rs-route') && (document.getElementById('rs-route').textContent = tripData.from + ' → ' + tripData.to);
    const dt = new Date(tripData.date);
    const locale = currentLang === 'EN' ? 'en-US' : 'th-TH';
    const dateStr = dt.toLocaleDateString(locale, { day: 'numeric', month: 'short' });
    document.getElementById('rs-when') && (document.getElementById('rs-when').textContent = dateStr + ' • ' + tripData.time);
    document.getElementById('rs-distance') && (document.getElementById('rs-distance').textContent = distKm + ' กม.');
    document.getElementById('rs-duration') && (document.getElementById('rs-duration').textContent = durText);
    document.getElementById('rs-income') && (document.getElementById('rs-income').textContent = '฿' + incomePerPassenger);

    // ====== Generate Smart Pickup Points (หาจังหวัดที่ผ่านจริง) ======
    const routeCoords = route.geometry.coordinates; // [lng, lat]

    // คำนวณระยะสะสมของแต่ละจุดบนเส้นทาง
    const cumDist = [0];
    for (let i = 1; i < routeCoords.length; i++) {
      const [lng1, lat1] = routeCoords[i-1];
      const [lng2, lat2] = routeCoords[i];
      const segDist = distanceKm({lat: lat1, lng: lng1}, {lat: lat2, lng: lng2});
      cumDist.push(cumDist[i-1] + segDist);
    }

    // สุ่มตัวอย่างจุดทุก ~30 กม. (ไม่เกิน 14 จุดตัวอย่าง)
    const sampleInterval = Math.max(30, distKmNum / 14); // อย่างน้อย 30 กม. ต่อจุด
    const sampleIndices = [];
    let nextDist = sampleInterval;
    for (let i = 0; i < cumDist.length && nextDist < distKmNum - 20; i++) {
      if (cumDist[i] >= nextDist) {
        sampleIndices.push(i);
        nextDist += sampleInterval;
      }
    }

    // ถ้าเส้นทางสั้น (<80 กม.) แสดงจุดกลาง 2-3 จุด
    if (distKmNum < 80) {
      sampleIndices.length = 0;
      for (let k = 1; k <= 3; k++) {
        const idx = Math.floor(routeCoords.length * k / 4);
        if (routeCoords[idx]) sampleIndices.push(idx);
      }
    }

    loadingText.textContent = currentLang === 'EN' ? 'Finding cities along route...' : 'กำลังหาเมืองที่ผ่าน...';

    // Reverse geocode แต่ละจุด — เอาชื่อจังหวัดมา
    const candidatePoints = [];
    for (const idx of sampleIndices) {
      const [lng, lat] = routeCoords[idx];
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=${lang}&zoom=10`;
        const res = await fetch(url);
        const data = await res.json();
        const addr = data.address || {};
        // เอาชื่อจังหวัด/เมืองหลัก
        const province = addr.state || addr.province || addr.county || '';
        const city = addr.city || addr.town || addr.municipality || addr.suburb || '';
        const district = addr.county || addr.district || '';
        const displayName = city || district || province || (currentLang === 'EN' ? 'Stop' : 'จุดพัก');

        candidatePoints.push({
          name: displayName,
          province: province,
          lat: lat,
          lng: lng,
          distFromStart: cumDist[idx]
        });
      } catch (e) {
        // ถ้า fail ใส่จุดเปล่าไว้
        candidatePoints.push({
          name: currentLang === 'EN' ? 'Stop' : 'จุดพัก',
          province: '',
          lat: lat,
          lng: lng,
          distFromStart: cumDist[idx]
        });
      }
    }

    // กรองชื่อซ้ำ (ใช้ name ไม่ใช่ province) — เก็บสูงสุด 10 จุด
    const seenNames = new Set();
    const uniquePoints = [];
    for (const pt of candidatePoints) {
      const key = (pt.name || '').toLowerCase();
      if (key && !seenNames.has(key) && uniquePoints.length < 10) {
        seenNames.add(key);
        uniquePoints.push(pt);
      }
    }

    // สร้าง pickup list
    const pickupPoints = [
      { name: tripData.from, distFromStart: 0, isStart: true }
    ];
    uniquePoints.forEach((pt) => {
      pickupPoints.push({
        name: pt.name + (pt.province && pt.name !== pt.province ? ' · ' + pt.province : ''),
        distFromStart: pt.distFromStart,
        lat: pt.lat,
        lng: pt.lng
      });
    });
    pickupPoints.push({ name: tripData.to, distFromStart: distKmNum, isEnd: true });

    renderPickupPoints(pickupPoints, distKmNum, pricePerKm);

    // วาด marker pickup บนแผนที่ — ใช้สีและขนาดแตกต่างให้ดูเป็นจุดสำคัญ
    uniquePoints.forEach((pt, i) => {
      const stopIcon = L.divIcon({
        className: 'cp-marker',
        html: `<div style="background:#FFA630;color:white;width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 3px 10px rgba(255,166,48,0.5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:'Manrope',sans-serif">${i + 1}</div>`,
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
      const marker = L.marker([pt.lat, pt.lng], { icon: stopIcon }).addTo(map);
      // tooltip บอกชื่อ
      marker.bindTooltip(pt.name, {
        permanent: false,
        direction: 'top',
        offset: [0, -10],
        className: 'pickup-tooltip'
      });
    });

    loading.style.display = 'none';
    summary.style.display = 'block';
    setTimeout(() => map.invalidateSize(), 100);

  } catch (e) {
    loadingText.textContent = '❌ ' + e.message;
    loading.style.background = '#FEF2F2';
    loading.style.color = '#991B1B';
    loading.querySelector('.spinner').style.display = 'none';
  }
}

// render pickup points list
// state เก็บ index ของ pickup ที่ถูกเลือก (สำหรับ driver)
const selectedPickups = new Set();
const MAX_PICKUPS = 6;

function renderPickupPoints(points, totalKm, pricePerKm) {
  const list = document.getElementById('pickup-list');
  if (!list) return;

  const pickupAt = currentLang === 'EN' ? 'Pickup at' : 'ขึ้นที่';

  // หัวข้อแสดงจำนวนที่เลือก

    <div class="pickup-counter-row">
      <div class="pickup-counter-label">
        <span>✓ ${currentLang === 'EN' ? 'Selected' : 'เลือกแล้ว'}</span>
      </div>
      <div class="pickup-counter-val">
        <span id="pickup-count">${selectedPickups.size}</span><span style="color:var(--text-muted)">/${MAX_PICKUPS}</span>
      </div>
    </div>
    <div class="pickup-hint-small" id="pickup-hint-small">

    </div>

    const remainKm = totalKm - pt.distFromStart;

    const km = remainKm.toFixed(0);

        <div class="pickup-dot-wrap">
          <div class="pickup-dot">${isSelected ? '<span class="pickup-check">✓</span>' : ''}</div>
        </div>
        <div class="pickup-content">
          <div class="pickup-name">${pt.name}</div>
          <div class="pickup-meta">${pt.isStart ? (currentLang === 'EN' ? 'Starting point (auto)' : 'จุดเริ่มต้น (auto)') :
                                    pt.isEnd ? (currentLang === 'EN' ? 'Destination (auto)' : 'ปลายทาง (auto)') :

        </div>
        ${!pt.isEnd ? `
          <div class="pickup-price-tag">
            <div class="ppt-price">฿${price}</div>
            <div class="ppt-km">${km}${kmLabel}</div>
          </div>
        ` : `<div class="pickup-price-tag"><div class="ppt-km">${currentLang === 'EN' ? 'End' : 'สิ้นสุด'}</div></div>`}
      </div>
    `;
  }).join('');

  list.innerHTML = headerHtml + itemsHtml;

  // เก็บข้อมูล points ไว้ใน window สำหรับใช้งานต่อ
  window._currentPickups = points;
  window._currentTotalKm = totalKm;
  window._currentPricePerKm = pricePerKm;
}

function togglePickup(idx) {
  if (selectedPickups.has(idx)) {
    selectedPickups.delete(idx);
  } else {
    if (selectedPickups.size >= MAX_PICKUPS) {
      // เด้ง warning เด่นๆ
      const hint = document.getElementById('pickup-hint-small');
      if (hint) {
        hint.textContent = currentLang === 'EN'
          ? `⚠️ Max ${MAX_PICKUPS} stops reached — deselect one first`
          : `⚠️ เลือกครบ ${MAX_PICKUPS} จุดแล้ว — ยกเลิกจุดอื่นก่อน`;
        hint.classList.add('warning');
        setTimeout(() => {
          if (hint) {
            hint.classList.remove('warning');
            hint.textContent = currentLang === 'EN' ? 'Tap dots to select stops you can offer' : 'แตะจุดที่คุณรับผู้โดยสารได้ (สูงสุด ' + MAX_PICKUPS + ' จุด)';
          }
        }, 2500);
      }
      return;
    }
    selectedPickups.add(idx);
  }

  // re-render
  if (window._currentPickups) {
    renderPickupPoints(window._currentPickups, window._currentTotalKm, window._currentPricePerKm);
  }
}

// ====== Trip Detail Map (Passenger View) ======
// state: เก็บ pickup ที่ผู้โดยสารเลือก (สำหรับคำนวณราคา)
let passengerSelectedPickup = null;
let detailMap = null;
let detailPickupPoints = null;
let detailTotalKm = null;
let detailPricePerKm = 1.0; // สมมุติคนขับตั้งราคา ฿1.0/กม.

async function initDetailMap() {
  // mock: สมมุติทริปคือ กรุงเทพ → เชียงใหม่ ราคา ฿650 ทั้งเส้น
  const mockTripFrom = currentLang === 'EN' ? 'Bangkok' : 'กรุงเทพ';
  const mockTripTo = currentLang === 'EN' ? 'Chiang Mai' : 'เชียงใหม่';

  const loadingEl = document.getElementById('detail-map-loading');
  const overlay = document.getElementById('detail-map-overlay');
  const mapDiv = document.getElementById('detail-map');
  if (!mapDiv) return;

  // ลบ map เก่า ถ้ามี
  if (detailMap) {
    detailMap.remove();
    detailMap = null;
  }

  // สร้าง map
  detailMap = L.map('detail-map', { zoomControl: false, attributionControl: false, scrollWheelZoom: false, dragging: true }).setView([15.87, 100.99], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(detailMap);

  try {
    const fromPt = await geocode(mockTripFrom);
    const toPt = await geocode(mockTripTo);
    const route = await getRoute(fromPt, toPt);

    const routeCoords = route.geometry.coordinates;
    const polylineCoords = routeCoords.map(c => [c[1], c[0]]);
    const distKmNum = route.distance / 1000;
    detailTotalKm = distKmNum;

    // วาดเส้นทาง
    const polyline = L.polyline(polylineCoords, {
      color: '#00A082',
      weight: 4,
      opacity: 0.85
    }).addTo(detailMap);
    detailMap.fitBounds(polyline.getBounds(), { padding: [20, 20] });

    // marker ต้นทาง/ปลายทาง
    const greenIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#00A082;width:14px;height:14px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,160,130,0.5)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    const redIcon = L.divIcon({
      className: 'cp-marker',
      html: '<div style="background:#DC2626;width:14px;height:14px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(220,38,38,0.5)"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    L.marker([fromPt.lat, fromPt.lng], { icon: greenIcon }).addTo(detailMap);
    L.marker([toPt.lat, toPt.lng], { icon: redIcon }).addTo(detailMap);

    // คำนวณจุดจอด — สมมุติคนขับเลือกไว้ 4 จุด (mockup)
    // ใน production จริงจะดึงจาก server
    const cumDist = [0];
    for (let i = 1; i < routeCoords.length; i++) {
      const [lng1, lat1] = routeCoords[i-1];
      const [lng2, lat2] = routeCoords[i];
      cumDist.push(cumDist[i-1] + distanceKm({lat: lat1, lng: lng1}, {lat: lat2, lng: lng2}));
    }

    // จุดจอด 4 จุดที่คนขับเลือก (สมมุติทุก ~140 กม.)
    const driverStops = [];
    const stopDistances = [140, 290, 450, 580]; // กม. จากต้นทาง
    for (const d of stopDistances) {
      if (d < distKmNum) {
        // หา index ที่ระยะใกล้ที่สุด
        let nearestIdx = 0;
        let minDiff = Infinity;
        for (let i = 0; i < cumDist.length; i++) {
          const diff = Math.abs(cumDist[i] - d);
          if (diff < minDiff) { minDiff = diff; nearestIdx = i; }
        }
        driverStops.push({
          lat: routeCoords[nearestIdx][1],
          lng: routeCoords[nearestIdx][0],
          distFromStart: cumDist[nearestIdx]
        });
      }
    }

    // เก็บข้อมูลสำหรับ render list
    const pickupPoints = [
      { name: mockTripFrom, distFromStart: 0, isStart: true }
    ];

    // reverse geocode ทุกจุด (ใน parallel ก็ได้)
    for (let i = 0; i < driverStops.length; i++) {
      const stop = driverStops[i];
      let name = currentLang === 'EN' ? `Stop ${i+1}` : `จุดที่ ${i+1}`;
      try {
        const lang = currentLang === 'EN' ? 'en' : 'th';
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${stop.lat}&lon=${stop.lng}&accept-language=${lang}&zoom=10`;
        const res = await fetch(url);
        const data = await res.json();
        const addr = data.address || {};
        name = addr.city || addr.town || addr.suburb || addr.county || addr.state || name;
      } catch (e) {}
      pickupPoints.push({ name, lat: stop.lat, lng: stop.lng, distFromStart: stop.distFromStart });

      // วาด marker
      const stopIcon = L.divIcon({
        className: 'cp-marker',
        html: `<div style="background:#FFA630;color:white;width:22px;height:22px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:'Manrope',sans-serif">${i+1}</div>`,
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
      L.marker([stop.lat, stop.lng], { icon: stopIcon }).addTo(detailMap).bindTooltip(name, { direction: 'top', offset: [0, -8], className: 'pickup-tooltip' });
    }
    pickupPoints.push({ name: mockTripTo, distFromStart: distKmNum, isEnd: true });

    detailPickupPoints = pickupPoints;
    // คำนวณ price per km จากราคาทั้งเส้น (mock: ฿650 / ระยะรวม)
    detailPricePerKm = 650 / distKmNum;

    renderPassengerPickupList(pickupPoints, distKmNum, detailPricePerKm);

    // แสดง overlay ระยะทาง
    if (overlay) {
      overlay.style.display = 'block';
      const distEl = document.getElementById('detail-map-dist');
      if (distEl) distEl.textContent = Math.round(distKmNum) + (currentLang === 'EN' ? ' km' : ' กม.');
    }
    if (loadingEl) loadingEl.style.display = 'none';
    setTimeout(() => detailMap && detailMap.invalidateSize(), 100);

  } catch (e) {
    if (loadingEl) loadingEl.textContent = '❌ ' + e.message;
  }
}

function renderPassengerPickupList(points, totalKm, pricePerKm) {
  const list = document.getElementById('passenger-pickup-list');
  if (!list) return;

  const pickupAt = currentLang === 'EN' ? 'Pickup at' : 'ขึ้นที่';
  const kmLabel = currentLang === 'EN' ? ' km' : ' กม.';
  passengerSelectedPickup = null;

  list.innerHTML = points.map((pt, idx) => {
    const remainKm = totalKm - pt.distFromStart;
    const price = pt.isEnd ? 0 : Math.round(remainKm * pricePerKm);
    const km = remainKm.toFixed(0);
    const startClass = pt.isStart ? 'start' : '';
    const endClass = pt.isEnd ? 'end' : '';
    const isMiddle = !pt.isStart && !pt.isEnd;
    const isStart = pt.isStart;

    return `
      <div class="pickup-item ${startClass} ${endClass}" data-passenger-pickup-idx="${idx}"
           ${!pt.isEnd ? `onclick="selectPassengerPickup(${idx}, ${remainKm.toFixed(2)}, ${pricePerKm}, ${JSON.stringify(pt.name).replace(/"/g, '&quot;')})"` : ''}>
        ${idx > 0 ? '<div class="pickup-line" style="bottom:50%;top:-50%"></div>' : ''}
        ${idx < points.length - 1 ? '<div class="pickup-line" style="top:50%"></div>' : ''}
        <div class="pickup-dot-wrap">
          <div class="pickup-dot"></div>
        </div>
        <div class="pickup-content">
          <div class="pickup-name">${pt.name}</div>
          <div class="pickup-meta">${pt.isStart ? (currentLang === 'EN' ? 'Starting point' : 'จุดเริ่มต้น') :
                                    pt.isEnd ? (currentLang === 'EN' ? 'Destination' : 'ปลายทาง') :
                                    pickupAt + ' • ' + (totalKm - remainKm).toFixed(0) + kmLabel + ' ' + (currentLang === 'EN' ? 'in' : 'จากต้นทาง')}</div>
        </div>
        ${!pt.isEnd ? `
          <div class="pickup-price-tag">
            <div class="ppt-price">฿${price}</div>
            <div class="ppt-km">${km}${kmLabel}</div>
          </div>
        ` : `<div class="pickup-price-tag"><div class="ppt-km">${currentLang === 'EN' ? 'End' : 'สิ้นสุด'}</div></div>`}
      </div>
    `;
  }).join('');

  // เลือกจุดเริ่มต้น default
  selectPassengerPickup(0, totalKm.toFixed(2), pricePerKm, points[0].name);
}

function selectPassengerPickup(idx, remainKm, pricePerKm, name) {
  passengerSelectedPickup = { idx, remainKm: parseFloat(remainKm), price: Math.round(parseFloat(remainKm) * pricePerKm), name };

  // อัปเดต UI: active state
  document.querySelectorAll('[data-passenger-pickup-idx]').forEach(el => el.classList.remove('picked'));
  const item = document.querySelector(`[data-passenger-pickup-idx="${idx}"]`);
  if (item) item.classList.add('picked');

  // แสดง summary บอกราคาจากจุดที่เลือก
  const summary = document.getElementById('selected-pickup-summary');
  if (summary) {
    summary.style.display = 'flex';
    document.getElementById('sps-name').textContent = name;
    document.getElementById('sps-price').textContent = passengerSelectedPickup.price.toLocaleString();
    document.getElementById('sps-km').textContent = parseFloat(remainKm).toFixed(0) + (currentLang === 'EN' ? ' km' : ' กม.');
  }

  // เปลี่ยน text ของปุ่ม
  const btn = document.getElementById('book-btn');
  if (btn) {
    if (idx === 0) {
      btn.textContent = currentLang === 'EN' ? '🚗 Book this seat (full route)' : '🚗 จองที่นั่งนี้ (เต็มเส้นทาง)';
    } else {
      btn.textContent = currentLang === 'EN' ? `🚗 Book from ${name}` : `🚗 จองจาก ${name}`;
    }
  }
}

function bookSeat() {
  if (!passengerSelectedPickup) {
    alert(t('bookSuccess'));
    return;
  }
  const msg = currentLang === 'EN'
    ? `✓ Booked!\n\nBoarding at: ${passengerSelectedPickup.name}\nDistance: ${passengerSelectedPickup.remainKm.toFixed(0)} km\nTotal: ฿${passengerSelectedPickup.price}`
    : `✓ จองสำเร็จ!\n\nขึ้นที่: ${passengerSelectedPickup.name}\nระยะ: ${passengerSelectedPickup.remainKm.toFixed(0)} กม.\nยอดรวม: ฿${passengerSelectedPickup.price}`;
  alert(msg);
  show('trips');
}

navBtns.forEach(b => b.addEventListener('click', () => show(b.dataset.screen)));
show('home');
</script>
